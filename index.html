<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CarPlay Premium Dashboard Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-black: #050507;
            --panel-bg: rgba(22, 22, 26, 0.75);
            --panel-border: rgba(255, 255, 255, 0.08);
            --apple-blue: #0a84ff;
            --apple-red: #ff453a;
            --text-white: #ffffff;
            --text-muted: #8e8e93;
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden;
            background-color: var(--bg-black); color: var(--text-white);
            font-family: var(--font-main);
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
        }

        /* Фоновое неоновое свечение (Ambient Light) */
        .ambient-glow {
            position: absolute; width: 60vh; height: 60vh; filter: blur(140px);
            opacity: 0.12; z-index: -1; pointer-events: none;
        }
        .glow-left { top: -10%; left: -10%; background: var(--apple-blue); }
        .glow-right { bottom: -10%; right: -10%; background: var(--apple-red); }

        /* Верхний статус-бар */
        .top-bar {
            height: 60px; display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .brand span { color: var(--apple-blue); }
        
        .nav-controls { display: flex; gap: 12px; }
        .action-pill {
            background: var(--panel-bg); border: 1px solid var(--panel-border);
            color: var(--text-white); padding: 10px 20px; border-radius: 20px;
            font-size: 14px; font-weight: 600; cursor: pointer; backdrop-filter: blur(20px);
            transition: all 0.2s ease; display: flex; align-items: center; gap: 8px;
        }
        .action-pill.active {
            background: var(--apple-blue); border-color: transparent; box-shadow: 0 0 15px rgba(10, 132, 255, 0.4);
        }
        .action-pill:active { transform: scale(0.96); }
        .system-time { font-size: 20px; font-weight: 700; min-width: 60px; text-align: right; }

        /* Основной контейнер сетки */
        .dashboard-grid {
            flex: 1; display: grid; gap: 24px; margin: 10px 0; align-items: center; overflow: hidden;
        }

        /* --------------------------------------------
           ГОРИЗОНТАЛЬНЫЙ РЕЖИМ (Планшет / Магнитола)
        -------------------------------------------- */
        @media (orientation: landscape) {
            .dashboard-grid { grid-template-columns: 1.2fr 1fr 1.2fr; }
            .portrait-layout { display: none !important; }
        }

        /* --------------------------------------------
           ВЕРТИКАЛЬНЫЙ РЕЖИМ (Смартфон в держателе)
        -------------------------------------------- */
        @media (orientation: portrait) {
            body { padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
            .dashboard-grid { grid-template-columns: 1fr; grid-template-rows: auto; align-items: start; overflow-y: auto; }
            .landscape-layout { display: none !important; }
            
            /* Стилизация скрытия нативных элементов под портрет как на скрине IMG_9474.png */
            .portrait-gauges-row {
                display: flex; justify-content: space-between; items-content: center; gap: 10px; height: 140px; margin-bottom: 10px;
            }
            .portrait-gauges-row .gauge-wrapper { height: 100%; aspect-ratio: 1/1; }
        }

        /* Стилизация круглых шкал приборов */
        .gauge-wrapper {
            position: relative; width: 100%; display: flex; align-items: center; justify-content: center;
        }
        .gauge-svg { width: 100%; height: 100%; }
        .gauge-bg-track { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 6; }
        .gauge-dynamic-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.15s linear; }
        .gauge-tick-line { stroke: rgba(255, 255, 255, 0.15); stroke-width: 1.5; }
        .gauge-tick-text { fill: var(--text-muted); font-size: 9px; font-weight: 700; text-anchor: middle; }

        .gauge-center-data { position: absolute; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .value-display-big { font-size: 9vh; font-weight: 800; line-height: 0.9; letter-spacing: -2px; }
        @media (orientation: portrait) { .value-display-big { font-size: 5vh; } }
        .unit-display-sub { font-size: 1.6vh; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-top: 6px; letter-spacing: 0.5px; }

        /* Центральный медиа- и дата-стек */
        .center-dashboard-stack { display: flex; flex-direction: column; gap: 16px; height: 100%; justify-content: center; }

        /* Премиальный Медиаплеер (Стиль Apple Music / Яндекс Музыка) */
        .premium-player {
            background: var(--panel-bg); border: 1px solid var(--panel-border);
            border-radius: 24px; padding: 18px; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; gap: 18px; align-items: center; box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .media-artwork-container {
            width: 90px; height: 90px; border-radius: 16px; overflow: hidden; position: relative;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); flex-shrink: 0; background: #1c1c1e;
        }
        .media-artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Живой визуализатор трека */
        .live-visualizer {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            top: 0; left: 0; display: flex; justify-content: center; align-items: center; gap: 3px; opacity: 0; transition: opacity 0.3s;
        }
        .live-visualizer.playing { opacity: 1; }
        .v-bar { width: 3px; height: 18px; background: #fff; border-radius: 2px; animation: soundWave 0.6s ease infinite alternate; }
        @keyframes soundWave { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(1.3); } }

        .media-meta-controls { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .media-title { font-size: 22px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .media-artist { font-size: 14px; color: var(--text-muted); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Интерактивный Скраббер Времени */
        .scrubber-wrapper { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
        .scrubber-bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; position: relative; }
        .scrubber-bar-fill { height: 100%; background: var(--text-white); border-radius: 3px; width: 0%; position: absolute; top: 0; left: 0; }
        .time-stamps { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-weight: 600; }

        /* Отрендеренные кнопки управления (SVG) */
        .media-action-row { display: flex; gap: 24px; align-items: center; }
        .media-btn { background: none; border: none; color: var(--text-white); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .media-btn:active { transform: scale(0.85); }
        .media-btn svg { fill: currentColor; width: 22px; height: 22px; }
        
        .media-btn.main-playback-toggle {
            width: 44px; height: 44px; background: var(--text-white); color: var(--bg-black); border-radius: 50%; box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }
        .media-btn.main-playback-toggle svg { width: 20px; height: 20px; }

        /* Сетка Датчиков Телеметрии Бортового Компьютера */
        .telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .telemetry-card {
            background: var(--panel-bg); border: 1px solid var(--panel-border);
            border-radius: 20px; padding: 16px; backdrop-filter: blur(20px);
        }
        .tel-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .tel-value { font-size: 28px; font-weight: 700; display: flex; align-items: baseline; gap: 4px; }
        .tel-value span { font-size: 16px; color: var(--text-muted); font-weight: 500; }

        /* Нижний блок системной информации */
        .global-summary-footer {
            height: 44px; display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.04); font-size: 13px; color: var(--text-muted); font-weight: 600; padding: 0 8px;
        }
    </style>
</head>
<body>

<!-- Аудио-ядро системы -->
<audio id="core-audio-engine" crossorigin="anonymous" preload="auto"></audio>

<div class="ambient-glow glow-left"></div>
<div class="ambient-glow glow-right"></div>

<!-- Шапка -->
<div class="top-bar">
    <div class="brand">Car<span>Play</span> PRO</div>
    <div class="nav-controls">
        <button class="action-pill" id="bleConnectTrigger">Bluetooth OBDII</button>
        <button class="action-pill" id="fullscreenTrigger">Экран</button>
    </div>
    <div class="system-time" id="liveClockDisplay">12:00</div>
</div>

<!-- Центральная рабочая область -->
<div class="dashboard-grid">

    <!-- [LANDSCAPE] Спидометр -->
    <div class="gauge-wrapper landscape-layout">
        <svg class="gauge-svg" viewBox="0 0 200 200" id="speedometerSvg"></svg>
        <div class="gauge-center-data">
            <div class="value-display-big" id="speedValueText">0</div>
            <div class="unit-display-sub">км/ч</div>
        </div>
    </div>

    <!-- [PORTRAIT] Верхний сдвоенный ряд приборов -->
    <div class="portrait-layout portrait-gauges-row">
        <div class="gauge-wrapper">
            <svg class="gauge-svg" viewBox="0 0 200 200" id="speedometerSvgPortrait"></svg>
            <div class="gauge-center-data">
                <div class="value-display-big" id="speedValueTextPortrait">0</div>
                <div class="unit-display-sub">км/ч</div>
            </div>
        </div>
        <div class="gauge-wrapper">
            <svg class="gauge-svg" viewBox="0 0 200 200" id="tachometerSvgPortrait"></svg>
            <div class="gauge-center-data">
                <div class="value-display-big" id="gearValueTextPortrait" style="color:var(--apple-red)">P</div>
                <div class="unit-display-sub">Передача</div>
            </div>
        </div>
    </div>

    <!-- Медиаплеер и телеметрия -->
    <div class="center-dashboard-stack">
        
        <!-- Кастомный Плеер -->
        <div class="premium-player">
            <div class="media-artwork-container">
                <div class="live-visualizer" id="audioVisualizerBlock">
                    <div class="v-bar" style="animation-delay: 0.1s"></div>
                    <div class="v-bar" style="animation-delay: 0.4s"></div>
                    <div class="v-bar" style="animation-delay: 0.2s"></div>
                </div>
                <img id="trackArtworkElement" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=150">
            </div>
            
            <div class="media-meta-controls">
                <div class="media-title" id="trackTitleElement">Комета</div>
                <div class="media-artist" id="trackArtistElement">JONY</div>
                
                <div class="scrubber-wrapper">
                    <div class="scrubber-bar-bg" id="audioScrubberTimeline">
                        <div class="scrubber-bar-fill" id="audioScrubberProgress"></div>
                    </div>
                    <div class="time-stamps">
                        <span id="timeElapsedElement">0:00</span>
                        <span id="timeDurationElement">0:00</span>
                    </div>
                </div>

                <div class="media-action-row">
                    <button class="media-btn" onclick="mediaEngine.prevTrack()">
                        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                    </button>
                    <button class="media-btn main-playback-toggle" onclick="mediaEngine.togglePlayback()">
                        <div id="playbackBtnIconWrapper"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
                    </button>
                    <button class="media-btn" onclick="mediaEngine.nextTrack()">
                        <svg viewBox="0 0 24 24"><path d="m6 18 8.5-6L6 6zm9-12v12h2V6z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Телеметрия -->
        <div class="telemetry-grid">
            <div class="telemetry-card">
                <div class="tel-label">Охлаждение</div>
                <div class="tel-value" id="coolantValueDisplay">90 <span>°C</span></div>
            </div>
            <div class="telemetry-card">
                <div class="tel-label">Вольтаж</div>
                <div class="tel-value" id="voltageValueDisplay" style="color:var(--apple-blue)">14.2 <span>V</span></div>
            </div>
            <div class="telemetry-card">
                <div class="tel-label">Масло</div>
                <div class="tel-value" id="oilValueDisplay">98 <span>°C</span></div>
            </div>
            <div class="telemetry-card">
                <div class="tel-label">Расход</div>
                <div class="tel-value" id="consumptionValueDisplay">8.4 <span>л</span></div>
            </div>
        </div>
    </div>

    <!-- [LANDSCAPE] Тахометр -->
    <div class="gauge-wrapper landscape-layout">
        <svg class="gauge-svg" viewBox="0 0 200 200" id="tachometerSvg"></svg>
        <div class="gauge-center-data">
            <div class="value-display-big" id="gearValueText" style="color:var(--apple-red)">P</div>
            <div class="unit-display-sub">Передача</div>
        </div>
    </div>

</div>

<!-- Системный Футер -->
<div class="global-summary-footer">
    <div id="totalOdoDisplay">Пробег: 124,562 км</div>
    <div id="tripOdoDisplay">Поездка: 14.5 км</div>
    <div id="rangeOdoDisplay">Запас хода: 412 км</div>
</div>

<script>
    // --- Конфигурация Ресурсов Медиатеки ---
    const mediaLibrary = [
        { title: "Комета", artist: "JONY", art: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=200", stream: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { title: "Где прошла ты", artist: "Кравц & Гио Пика", art: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200", stream: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { title: "As It Was", artist: "Harry Styles", art: "https://images.unsplash.com/photo-1459749411177-042180ceea72?w=200", stream: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
    ];

    // --- Глобальное Состояние Системы ---
    const obdSystemState = {
        speed: 0,
        rpm: 0,
        coolant: 90,
        voltage: 14.2,
        oil: 98,
        consumption: 8.4,
        trip: 14.5,
        bluetoothCharacteristic: null,
        isBleConnected: false
    };

    // --- Рендеринг Профессиональных Шкал Векторной Графики (SVG) ---
    function renderVectorGauge(targetId, maxLimit, graduationStep, hexColor) {
        const svgContainer = document.getElementById(targetId);
        if (!svgContainer) return;
        
        const centerPoint = 100, scaleRadius = 82, arcStartAngle = 135, arcEndAngle = 405;
        
        // Математический расчет длины дуги для корректного отображения обводки
        const circumference = 2 * Math.PI * scaleRadius;
        const usefulArcLength = (arcEndAngle - arcStartAngle) / 360 * circumference;

        let markupBuffer = `
            <circle class="gauge-bg-track" cx="100" cy="100" r="${scaleRadius}" stroke-dasharray="${usefulArcLength} ${circumference}" stroke-dashoffset="0" transform="rotate(135 100 100)"/>
            <circle id="${targetId}-dynamicFill" class="gauge-dynamic-fill" cx="100" cy="100" r="${scaleRadius}" stroke="${hexColor}" stroke-dasharray="0 ${circumference}" transform="rotate(135 100 100)"/>
        `;

        for (let valueIterator = 0; valueIterator <= maxLimit; valueIterator += graduationStep) {
            const currentAngle = arcStartAngle + (valueIterator / maxLimit) * (arcEndAngle - arcStartAngle);
            const radianFactor = currentAngle * Math.PI / 180;
            
            const outerX = centerPoint + scaleRadius * Math.cos(radianFactor);
            const outerY = centerPoint + scaleRadius * Math.sin(radianFactor);
            const innerX = centerPoint + (scaleRadius - 6) * Math.cos(radianFactor);
            const innerY = centerPoint + (scaleRadius - 6) * Math.sin(radianFactor);
            
            markupBuffer += `<line class="gauge-tick-line" x1="${innerX}" y1="${innerY}" x2="${outerX}" y2="${outerY}" />`;
            
            const labelX = centerPoint + (scaleRadius - 18) * Math.cos(radianFactor);
            const labelY = centerPoint + (scaleRadius - 18) * Math.sin(radianFactor) + 3.5;
            markupBuffer += `<text x="${labelX}" y="${labelY}" class="gauge-tick-text">${valueIterator}</text>`;
        }
        svgContainer.innerHTML = markupBuffer;
    }

    // --- Архитектура Медиа-Плеера ---
    const mediaEngine = {
        currentTrackIndex: 0,
        audioNode: document.getElementById('core-audio-engine'),
        
        init: function() {
            this.audioNode.src = mediaLibrary[this.currentTrackIndex].stream;
            
            this.audioNode.addEventListener('timeupdate', () => this.syncTimeline());
            this.audioNode.addEventListener('durationchange', () => this.syncTimeline());
            this.audioNode.addEventListener('ended', () => this.nextTrack());
            
            document.getElementById('audioScrubberTimeline').onclick = (e) => this.scrub(e);
            this.applyMetaUpdate();
        },
        
        togglePlayback: function() {
            const playIconContainer = document.getElementById('playbackBtnIconWrapper');
            const visualizer = document.getElementById('audioVisualizerBlock');
            
            if (this.audioNode.paused) {
                this.audioNode.play().then(() => {
                    playIconContainer.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
                    visualizer.classList.add('playing');
                }).catch(() => alert("Кликните еще раз для подтверждения аудио-сессии в Bluefy."));
            } else {
                this.audioNode.pause();
                playIconContainer.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
                visualizer.classList.remove('playing');
            }
        },
        
        changeTrack: function(direction) {
            this.currentTrackIndex = (this.currentTrackIndex + direction + mediaLibrary.length) % mediaLibrary.length;
            const absoluteState = this.audioNode.paused;
            this.audioNode.src = mediaLibrary[this.currentTrackIndex].stream;
            this.applyMetaUpdate();
            if (!absoluteState) { this.audioNode.play(); }
        },
        
        nextTrack: function() { this.changeTrack(1); },
        prevTrack: function() { this.changeTrack(-1); },
        
        applyMetaUpdate: function() {
            const track = mediaLibrary[this.currentTrackIndex];
            document.getElementById('trackTitleElement').innerText = track.title;
            document.getElementById('trackArtistElement').innerText = track.artist;
            document.getElementById('trackArtworkElement').src = track.art;
        },
        
        syncTimeline: function() {
            if (!this.audioNode.duration) return;
            const completionPercent = (this.audioNode.currentTime / this.audioNode.duration) * 100;
            document.getElementById('audioScrubberProgress').style.width = completionPercent + "%";
            document.getElementById('timeElapsedElement').innerText = this.convertSecondsToReadable(this.audioNode.currentTime);
            document.getElementById('timeDurationElement').innerText = this.convertSecondsToReadable(this.audioNode.duration);
        },
        
        scrub: function(e) {
            const timelineBounds = e.currentTarget.getBoundingClientRect();
            const relativeClickRatio = (e.clientX - timelineBounds.left) / timelineBounds.width;
            if (this.audioNode.duration) {
                this.audioNode.currentTime = relativeClickRatio * this.audioNode.duration;
            }
        },
        
        convertSecondsToReadable: function(totalSeconds) {
            if (isNaN(totalSeconds)) return "0:00";
            const computedMinutes = Math.floor(totalSeconds / 60);
            const remainingSeconds = Math.floor(totalSeconds % 60);
            return `${computedMinutes}:${remainingSeconds < 10 ? '0' : ''}${remainingSeconds}`;
        }
    };

    // --- Bluetooth OBDII Драйвер Стека (Bluefy / iOS Web Bluetooth Web API) ---
    async function executeBluetoothConnectionSequence() {
        const connectionButton = document.getElementById('bleConnectTrigger');
        try {
            connectionButton.innerText = "Поиск...";
            
            const obdHardwareDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [0xffe0] }, { namePrefix: 'OBD' }, { namePrefix: 'ELM' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            const gattServerSession = await obdHardwareDevice.gatt.connect();
            const obdPrimaryService = await gattServerSession.getPrimaryService(0xffe0);
            const rxTxCharacteristic = await obdPrimaryService.getCharacteristic(0xffe1);

            obdSystemState.bluetoothCharacteristic = rxTxCharacteristic;
            obdSystemState.isBleConnected = true;
            
            connectionButton.innerText = "Подключено";
            connectionButton.classList.add('active');
            
            // Нативный конвейер циклического опроса ЭБУ автомобиля
            startObdQueryPipeline();
        } catch (connectionError) {
            console.error("OBD-Error: ", connectionError);
            connectionButton.innerText = "Ошибка BT";
            setTimeout(() => {
                connectionButton.innerText = "Bluetooth OBDII";
                connectionButton.classList.remove('active');
            }, 2500);
        }
    }

    function startObdQueryPipeline() {
        const textEncoder = new TextEncoder();
        setInterval(async () => {
            if (obdSystemState.isBleConnected && obdSystemState.bluetoothCharacteristic) {
                try {
                    // Передача AT-команды запроса текущих оборотов двигателя (PID 010C)
                    await obdSystemState.bluetoothCharacteristic.writeValue(textEncoder.encode("010C\r"));
                } catch (writeError) {
                    console.log("Потеря пакета данных при опросе: ", writeError);
                }
            }
        }, 400);
    }

    // --- Полноэкранный Режим Планшета ---
    function toggleSystemFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    }

    // --- Высокоточный Главный Анимационный Цикл Интерфейса (60 FPS) ---
    function executeGlobalUiRefreshLoop() {
        // Синхронизация системных часов смартфона/магнитолы
        const calendarInstance = new Date();
        document.getElementById('liveClockDisplay').innerText = calendarInstance.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        // Генерация реалистичной физики телеметрии для ДЕМО-режима (если адаптер не подключен)
        if (!obdSystemState.isBleConnected) {
            const timeWaveFactor = Date.now();
            obdSystemState.rpm = 750 + Math.abs(Math.sin(timeWaveFactor / 3000)) * 4200;
            obdSystemState.speed = (obdSystemState.rpm / 36);
            obdSystemState.trip += (obdSystemState.speed / 240000);
            
            // Динамические изменения вспомогательных параметров
            obdSystemState.coolant = 90 + Math.round(Math.sin(timeWaveFactor / 50000) * 2);
            obdSystemState.oil = 96 + Math.round(Math.sin(timeWaveFactor / 60000) * 3);
            obdSystemState.voltage = (14.1 + Math.sin(timeWaveFactor / 15000) * 0.15).toFixed(1);
        }

        // Вычисление лимитов длин дуг и рендеринг заполнения
        const totalStrokeCircumference = 2 * Math.PI * 82;
        const maxArcLengthFactor = 0.75; // 270 градусов

        // Синхронизация спидометров
        const finalSpeedFillValue = ((obdSystemState.speed / 220) * maxArcLengthFactor) * totalStrokeCircumference;
        
        const speedFillLandscape = document.getElementById('speedometerSvg-dynamicFill');
        if (speedFillLandscape) speedFillLandscape.style.strokeDasharray = `${finalSpeedFillValue} ${totalStrokeCircumference}`;
        
        const speedFillPortrait = document.getElementById('speedometerSvgPortrait-dynamicFill');
        if (speedFillPortrait) speedFillPortrait.style.strokeDasharray = `${finalSpeedFillValue} ${totalStrokeCircumference}`;
        
        const roundedSpeedValue = Math.round(obdSystemState.speed);
        if (document.getElementById('speedValueText')) document.getElementById('speedValueText').innerText = roundedSpeedValue;
        if (document.getElementById('speedValueTextPortrait')) document.getElementById('speedValueTextPortrait').innerText = roundedSpeedValue;

        // Синхронизация тахометров
        const finalRpmFillValue = ((obdSystemState.rpm / 8000) * maxArcLengthFactor) * totalStrokeCircumference;
        
        const rpmFillLandscape = document.getElementById('tachometerSvg-dynamicFill');
        if (rpmFillLandscape) rpmFillLandscape.style.strokeDasharray = `${finalRpmFillValue} ${totalStrokeCircumference}`;
        
        const rpmFillPortrait = document.getElementById('tachometerSvgPortrait-dynamicFill');
        if (rpmFillPortrait) rpmFillPortrait.style.strokeDasharray = `${finalRpmFillValue} ${totalStrokeCircumference}`;

        // Расчет текущей виртуальной передачи КПП
        const calculatedGear = obdSystemState.speed < 4 ? 'P' : Math.min(6, Math.ceil(obdSystemState.speed / 32));
        if (document.getElementById('gearValueText')) document.getElementById('gearValueText').innerText = calculatedGear;
        if (document.getElementById('gearValueTextPortrait')) document.getElementById('gearValueTextPortrait').innerText = calculatedGear;

        // Вывод текстовых блоков телеметрии в реальном времени
        document.getElementById('coolantValueDisplay').innerHTML = `${obdSystemState.coolant} <span>°C</span>`;
        document.getElementById('oilValueDisplay').innerHTML = `${obdSystemState.oil} <span>°C</span>`;
        document.getElementById('voltageValueDisplay').innerHTML = `${obdSystemState.voltage} <span>V</span>`;
        document.getElementById('tripOdoDisplay').innerText = `Поездка: ${obdSystemState.trip.toFixed(1)} км`;

        requestAnimationFrame(executeGlobalUiRefreshLoop);
    }

    // --- Точка Входа Системы При Загрузке Окна ---
    window.onload = () => {
        // Инициализация графических шкал шлюзов
        renderVectorGauge('speedometerSvg', 220, 20, 'var(--apple-blue)');
        renderVectorGauge('tachometerSvg', 8, 1, 'var(--apple-red)');
        
        renderVectorGauge('speedometerSvgPortrait', 220, 20, 'var(--apple-blue)');
        renderVectorGauge('tachometerSvgPortrait', 8, 1, 'var(--apple-red)');

        // Старт медиа-серверов и анимационного цикла
        mediaEngine.init();
        document.getElementById('bleConnectTrigger').addEventListener('click', executeBluetoothConnectionSequence);
        document.getElementById('fullscreenTrigger').addEventListener('click', toggleSystemFullscreen);
        
        executeGlobalUiRefreshLoop();
    };
</script>
</body>
</html>
