<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EGORKIN DEV v23.3</title>
    
    <!-- Карты Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            /* Базовая палитра Ночь */
            --bg: #0c0c0e;
            --card: rgba(22, 22, 28, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #929297;
            --yandex: #ffcc00;
            --map-blur: brightness(0.35) blur(3px);
            
            /* Динамические цвета режимов */
            --accent: #0a84ff;
            --red: #ff453a;
            
            /* Премиальные тени Ночь */
            --frame-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 0 1px rgba(255,255,255,0.15);
            --card-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            --speedo-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            
            /* Профессиональный многослойный неон */
            --neon-glow: drop-shadow(0 0 2px var(--accent)) drop-shadow(0 0 8px cubic-bezier(0,0,1,1) var(--accent));
            --neon-rpm: drop-shadow(0 0 2px var(--red)) drop-shadow(0 0 8px cubic-bezier(0,0,1,1) var(--red));
        }

        /* Светлый режим */
        [data-theme="day"] {
            --bg: #f2f2f7;
            --card: rgba(255, 255, 255, 0.94);
            --border: rgba(0, 0, 0, 0.06);
            --text: #1c1c1e;
            --text-dim: #68686d;
            --map-blur: brightness(0.96) blur(2.5px);
            
            --frame-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255,255,255,0.8);
            --card-shadow: 0 6px 16px rgba(0, 0, 0, 0.03);
            --speedo-shadow: 0 4px 20px rgba(0, 0, 0, 0.05), 0 1px 4px rgba(0, 0, 0, 0.02);
            
            --neon-glow: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
            --neon-rpm: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
        }

        /* Стили вождения (Drive Modes) */
        body[data-mode="eco"] { --accent: #34c759; }
        body[data-mode="comfort"] { --accent: #007aff; }
        body[data-mode="sport"] { --accent: #ff3b30; --red: #ff9500; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.3s ease;
        }

        #bg-map-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: var(--map-blur); transition: filter 0.3s;
            pointer-events: none;
        }

        /* ЭФФЕКТ ПЛАВНОГО РАЗЖИГАНИЯ СИСТЕМЫ */
        @keyframes powerOnIgnition {
            0% { opacity: 0; filter: brightness(0.1) saturate(0.5); transform: scale(0.98); }
            35% { opacity: 0.6; filter: brightness(0.7); }
            45% { opacity: 0.3; filter: brightness(0.4); } 
            65% { opacity: 0.9; filter: brightness(1.2) saturate(1.1); }
            100% { opacity: 1; filter: brightness(1) saturate(1); transform: scale(1); }
        }

        .ui-scale-container {
            width: calc(100vw - 24px); height: calc(100vh - 24px);
            position: relative; z-index: 2;
            display: flex; flex-direction: column;
            padding: 18px 24px;
            border: none; /* УБРАНА ОБВОДКА ВОКРУГ */
            border-radius: 28px;
            box-shadow: var(--frame-shadow);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(4px);
            transform-origin: center center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Запуск плавного розжига при старте */
            animation: powerOnIgnition 2.2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }
        
        [data-theme="day"] .ui-scale-container {
            background: rgba(0, 0, 0, 0.01);
            border: none; /* УБРАНА ОБВОДКА ВОКРУГ ДЛЯ ДНЕВНОЙ ТЕМЫ */
        }

        .header { 
            height: 50px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; 
            transition: opacity 0.4s ease, transform 0.4s ease; opacity: 1; margin-bottom: 5px;
        }
        .header.hidden { opacity: 0; transform: translateY(-15px); pointer-events: none; }
        
        .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); transition: color 0.3s; }
        
        .controls { display: flex; gap: 8px; z-index: 10; align-items: center; }
        
        .mode-selector {
            display: flex; background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 2px; box-shadow: var(--card-shadow);
        }
        .mode-tab {
            background: transparent; border: none; color: var(--text-dim);
            padding: 6px 12px; font-size: 11px; font-weight: 700; border-radius: 11px;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .mode-tab.active[data-m="eco"] { background: #34c759; color: #fff; }
        .mode-tab.active[data-m="comfort"] { background: #007aff; color: #fff; }
        .mode-tab.active[data-m="sport"] { background: #ff3b30; color: #fff; }

        .btn {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 8px 14px; border-radius: 14px;
            font-size: 11px; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow); transition: all 0.2s;
        }
        .btn-active { background: var(--accent); border-color: transparent; color: white; }
        
        .zoom-group { display: flex; background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--card-shadow); }
        .zoom-group .btn { border: none; border-radius: 0; padding: 8px 14px; font-weight: 800; box-shadow: none; }
        .zoom-group .btn:first-child { border-right: 1px solid var(--border); }

        .dashboard {
            flex: 1; display: grid; grid-template-columns: 1fr 1.2fr 1fr;
            gap: 24px; align-items: center; min-height: 0;
        }

        .gauge-container { position: relative; width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        .gauge-svg { width: 100%; height: 100%; transform: rotate(-10deg); }
        
        .neon-speed { filter: var(--neon-glow); transition: filter 0.3s; }
        .neon-tach { filter: var(--neon-rpm); transition: filter 0.3s; }
        .shift-flash { filter: drop-shadow(0 0 30px #ff3b30) brightness(1.6) !important; }

        /* ОКНО КАРТЫ СДЕЛАНО БОЛЬШЕ ПОД РАЗМЕР НОВЫХ КОЛЕЦ */
        .map-hole {
            position: absolute; width: 78%; height: 78%; border-radius: 50%;
            overflow: hidden; z-index: 1; border: 2px solid var(--border);
        }

        .central-display {
            position: absolute; z-index: 10; text-align: center;
            background: var(--card);
            padding: 14px 22px; border-radius: 22px;
            box-shadow: var(--speedo-shadow); border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            transition: box-shadow 0.3s, background 0.3s;
        }
        
        .gear-overlay-display {
            position: absolute; z-index: 10; text-align: center; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; transition: transform 0.1s;
        }
        .gear-val {
            font-size: clamp(56px, 7.5vh, 76px); font-weight: 900; line-height: 1;
            color: var(--accent); text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            transition: color 0.3s;
        }
        body[data-mode="sport"] .gear-val { color: #ffffff; text-shadow: 0 0 15px #ff3b30; }
        
        .gear-unit { font-size: 10px; color: #ffffff; font-weight: 800; letter-spacing: 1px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }

        .val { font-size: clamp(42px, 5.5vh, 56px); font-weight: 900; line-height: 1; }
        .unit { font-size: 11px; color: var(--text-dim); font-weight: 700; margin-top: 3px; letter-spacing: 0.5px; }

        .center-stack { 
            display: flex; flex-direction: column; gap: 12px; width: 100%; height: 100%; 
            justify-content: center; min-height: 0; 
        }
        
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 14px 18px; 
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(12px); box-shadow: var(--card-shadow);
            flex-shrink: 0;
        }

        .adas-grid { display: flex; gap: 12px; align-items: center; }
        .sign-circle {
            width: 52px; height: 52px; background: white; border-radius: 50%;
            border: 5px solid #ff3b30; display: flex; align-items: center; justify-content: center;
            color: black; font-size: 22px; font-weight: 900; box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .gps-status {
            width: 52px; height: 52px; border-radius: 50%; border: 2.5px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 10px; font-weight: 800; text-align: center; transition: all 0.3s;
        }

        .obd-scroll-box {
            display: none;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 2px;
        }
        .obd-internal-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .obd-scroll-box::-webkit-scrollbar { width: 0px; display: none; }

        .stat-item { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 16px; padding: 12px; backdrop-filter: blur(10px); 
            box-shadow: var(--card-shadow); 
        }
        .stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; letter-spacing: 0.3px; }
        .stat-val { font-size: 18px; font-weight: 700; margin-top: 3px; }

        .footer {
            height: 35px; display: flex; justify-content: space-between;
            align-items: center; font-size: 12px; font-weight: 600; color: var(--text-dim);
            border-top: 1px solid var(--border); flex-shrink: 0; margin-top: auto;
        }
    </style>
</head>
<body data-theme="dark" data-mode="comfort">

<div id="bg-map-layer"></div>

<div class="ui-scale-container" id="globalUiWrapper">

    <!-- Верхняя консоль -->
    <div class="header" id="topHeader">
        <div class="logo">EGORKIN <span>DEV</span></div>
        
        <div class="controls">
            <div class="mode-selector">
                <button class="mode-tab" data-m="eco" onclick="changeDriveMode('eco', event)">Eco</button>
                <button class="mode-tab active" data-m="comfort" onclick="changeDriveMode('comfort', event)">Comfort</button>
                <button class="mode-tab" data-m="sport" onclick="changeDriveMode('sport', event)">Sport</button>
            </div>

            <div class="zoom-group">
                <button class="btn" onclick="globalScaleUp(event)">+</button>
                <button class="btn" onclick="globalScaleDown(event)">-</button>
            </div>
            <button class="btn" id="themeBtn" onclick="toggleTheme(event)">Ночь</button>
            <button class="btn" id="connectBtn" onclick="toggleObdBlock(event)">OBDII</button>
            <button class="btn" onclick="toggleWebFullscreen(event)">Экран</button>
        </div>
        <div id="clock" style="font-weight: 700; font-size: 16px; min-width: 45px; text-align: right;">21:40</div>
    </div>

    <!-- Основной Дашборд -->
    <div class="dashboard">
        
        <!-- Спидометр (Радиус увеличен до 91) -->
        <div class="gauge-container">
            <svg class="gauge-svg neon-speed" id="speedSvgRing" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="91" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4" stroke-dasharray="2 6" transform="rotate(140 100 100)"/>
                <circle cx="100" cy="100" r="91" fill="none" stroke="var(--border)" stroke-width="5" stroke-dasharray="430 600" stroke-linecap="round" transform="rotate(140 100 100)"/>
                <circle id="speedFill" cx="100" cy="100" r="91" fill="none" stroke="var(--accent)" stroke-width="7" stroke-dasharray="0 600" stroke-linecap="round" transform="rotate(140 100 100)" style="transition: stroke-dasharray 0.1s linear, stroke 0.3s"/>
            </svg>
            <div class="central-display">
                <div class="val" id="speedNum">0</div>
                <div class="unit">КМ/Ч</div>
            </div>
        </div>

        <!-- Центральный информационный блок -->
        <div class="center-stack">
            <div class="card" style="height: 68px;">
                <div>
                    <div style="font-size: 9px; color: var(--yandex); font-weight: 800; letter-spacing: 0.5px;">ЯНДЕКС МУЗЫКА</div>
                    <div style="font-size: 15px; font-weight: 700; margin-top: 1px;">Мой Плейлист Авто</div>
                </div>
                <button class="btn btn-active" style="background: var(--accent);" onclick="window.open('https://music.yandex.ru', '_blank')">Включить</button>
            </div>

            <div class="card" style="height: 68px;">
                <div style="font-size: 10px; font-weight: 800; color: var(--text-dim); line-height: 1.2;">СИСТЕМА<br>ADAS</div>
                <div class="adas-grid">
                    <div class="sign-circle" id="signSpeed">60</div>
                    <div class="gps-status" id="gpsStatus">TEST</div>
                </div>
            </div>

            <!-- Изолированный OBDII-блок -->
            <div class="obd-scroll-box" id="obdScrollContainer">
                <div class="obd-internal-grid">
                    <div class="stat-item">
                        <div class="stat-label">Охлаждение</div>
                        <div class="stat-val"><span id="coolant">--</span>°C</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Вольтаж</div>
                        <div class="stat-val" style="color: var(--accent);"><span id="volt">--</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Масло</div>
                        <div class="stat-val"><span id="oil">--</span>°C</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Расход</div>
                        <div class="stat-val"><span id="fuelFlow">--</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Обороты</div>
                        <div class="stat-val"><span id="obdRpm">--</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Дроссель</div>
                        <div class="stat-val"><span id="throttle">--</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Тахометр (Радиус увеличен до 91) + Встроенная карта -->
        <div class="gauge-container">
            <div id="mapGaugeSlot" class="map-hole"></div>
            <svg class="gauge-svg neon-tach" id="tachSvgRing" viewBox="0 0 200 200" style="z-index: 5; pointer-events: none;">
                <circle cx="100" cy="100" r="91" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4" stroke-dasharray="1 5" transform="rotate(140 100 100)"/>
                <circle cx="100" cy="100" r="91" fill="none" stroke="var(--border)" stroke-width="5" stroke-dasharray="430 600" stroke-linecap="round" transform="rotate(140 100 100)"/>
                <circle id="rpmFill" cx="100" cy="100" r="91" fill="none" stroke="var(--red)" stroke-width="7" stroke-dasharray="0 600" stroke-linecap="round" transform="rotate(140 100 100)" style="transition: stroke-dasharray 0.1s linear"/>
            </svg>
            <div class="gear-overlay-display" id="gearContainer">
                <div class="gear-val" id="gearNum">TEST</div>
                <div class="gear-unit">ПЕРЕДАЧА</div>
            </div>
        </div>
    </div>

    <!-- Зафиксированный нижний футер -->
    <div class="footer">
        <div>Пробег: 142,833 км</div>
        <div id="trip">Поездка: 0.0 км</div>
        <div>Запас хода: 446 км</div>
    </div>
</div>

<script>
    let isDayMode = false;
    let isObdActive = false; 
    let isStartupTesting = true; 
    
    let currentSpeedKmh = 0; 
    let currentRpm = 0;
    let lastGear = 'P';
    let globalPageScale = 1.0; 
    
    let mapBgInstance, mapGaugeInstance;
    let globalGpsMarkerBg, globalGpsMarkerGauge;
    let hideControlsTimeout;

    function resetHideControlsTimer() {
        const header = document.getElementById('topHeader');
        header.classList.remove('hidden');
        clearTimeout(hideControlsTimeout);
        hideControlsTimeout = setTimeout(() => {
            if (!isStartupTesting) header.classList.add('hidden');
        }, 4000);
    }
    window.addEventListener('click', resetHideControlsTimer);
    window.addEventListener('touchstart', resetHideControlsTimer);

    function changeDriveMode(modeName, event) {
        if(event) event.stopPropagation();
        document.body.setAttribute('data-mode', modeName);
        document.querySelectorAll('.mode-tab').forEach(btn => {
            if(btn.getAttribute('data-m') === modeName) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function applyGlobalScale() {
        const wrapper = document.getElementById('globalUiWrapper');
        wrapper.style.transform = `scale(${globalPageScale})`;
        setTimeout(() => {
            if(mapBgInstance) mapBgInstance.invalidateSize();
            if(mapGaugeInstance) mapGaugeInstance.invalidateSize();
        }, 150);
    }

    function globalScaleUp(e) { e.stopPropagation(); if(globalPageScale < 1.25) { globalPageScale += 0.05; applyGlobalScale(); } }
    function globalScaleDown(e) { e.stopPropagation(); if(globalPageScale > 0.75) { globalPageScale -= 0.05; applyGlobalScale(); } }

    function toggleObdBlock(e) {
        e.stopPropagation();
        isObdActive = !isObdActive;
        const btn = document.getElementById('connectBtn');
        const obdBox = document.getElementById('obdScrollContainer');
        
        if(isObdActive) {
            obdBox.style.display = 'block';
            btn.classList.add('btn-active');
        } else {
            obdBox.style.display = 'none';
            btn.classList.remove('btn-active');
        }
    }

    function toggleTheme(e) {
        e.stopPropagation();
        isDayMode = !isDayMode;
        document.body.setAttribute('data-theme', isDayMode ? 'day' : 'dark');
        document.getElementById('themeBtn').innerText = isDayMode ? 'День' : 'Ночь';
        
        const styleName = isDayMode ? 'voyager' : 'dark_all';
        mapBgInstance.eachLayer(layer => mapBgInstance.removeLayer(layer));
        mapGaugeInstance.eachLayer(layer => mapGaugeInstance.removeLayer(layer));
        
        L.tileLayer(`https://{s}.basemaps.cartocdn.com/rastertiles/${styleName}/{z}/{x}/{y}{r}.png`).addTo(mapBgInstance);
        L.tileLayer(`https://{s}.basemaps.cartocdn.com/rastertiles/${styleName}/{z}/{x}/{y}{r}.png`).addTo(mapGaugeInstance);
    }

    function toggleWebFullscreen(e) {
        e.stopPropagation();
        const docEl = document.documentElement;
        const isFull = document.fullscreenElement || document.webkitFullscreenElement;

        if (!isFull) {
            if (docEl.requestFullscreen) docEl.requestFullscreen();
            else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    function runDashboardStartupTest() {
        const startTime = performance.now();
        const duration = 2400; 

        function animateTest(now) {
            const elapsed = now - startTime;
            const progress = elapsed / duration;

            if (progress < 1) {
                let wave;
                if (progress < 0.45) {
                    let p = progress / 0.45;
                    wave = Math.sin(p * Math.PI / 2); 
                } 
                else if (progress < 0.55) {
                    wave = 1.0;
                } 
                else {
                    let p = (progress - 0.55) / 0.45;
                    wave = 1.0 - Math.sin(p * Math.PI / 2);
                }

                currentSpeedKmh = wave * 220;
                currentRpm = wave * 8000;

                if (progress < 0.25) document.getElementById('gearNum').innerText = '1';
                else if (progress < 0.45) document.getElementById('gearNum').innerText = '3';
                else if (progress < 0.60) document.getElementById('gearNum').innerText = '6';
                else if (progress < 0.85) document.getElementById('gearNum').innerText = '2';
                else document.getElementById('gearNum').innerText = 'P';

                requestAnimationFrame(animateTest);
            } else {
                isStartupTesting = false;
                currentSpeedKmh = 0;
                currentRpm = isObdActive ? 750 : 0;
                document.getElementById('gpsStatus').innerText = "GPS IDLE";
            }
        }
        requestAnimationFrame(animateTest);
    }

    function calculateEngineMetrics(speed) {
        if (speed < 1.0) return { gear: 'N', rpm: 750 };
        let gear = 1, rpm = 750;
        if (speed >= 1.0 && speed < 25) { gear = 1; rpm = 1000 + ((speed - 1) / 24) * 2500; } 
        else if (speed >= 25 && speed < 48) { gear = 2; rpm = 1400 + ((speed - 25) / 23) * 2500; } 
        else if (speed >= 48 && speed < 75) { gear = 3; rpm = 1500 + ((speed - 48) / 27) * 2400; } 
        else if (speed >= 75 && speed < 105) { gear = 4; rpm = 1700 + ((speed - 75) / 30) * 2300; } 
        else if (speed >= 105 && speed < 140) { gear = 5; rpm = 1900 + ((speed - 105) / 35) * 2300; } 
        else { gear = 6; rpm = 2100 + ((speed - 140) / 80) * 2800; }
        return { gear: gear, rpm: Math.min(rpm, 6800) };
    }

    function initDualMapSystem() {
        const style = isDayMode ? 'voyager' : 'dark_all';
        const moscowCenter = [55.7539, 37.6208]; 

        mapBgInstance = L.map('bg-map-layer', { 
            zoomControl: false, attributionControl: false,
            dragging: false, touchZoom: false, scrollWheelZoom: false, 
            doubleClickZoom: false, boxZoom: false
        }).setView(moscowCenter, 16);
        L.tileLayer(`https://{s}.basemaps.cartocdn.com/rastertiles/${style}/{z}/{x}/{y}{r}.png`).addTo(mapBgInstance);

        mapGaugeInstance = L.map('mapGaugeSlot', { zoomControl: false, attributionControl: false }).setView(moscowCenter, 16);
        L.tileLayer(`https://{s}.basemaps.cartocdn.com/rastertiles/${style}/{z}/{x}/{y}{r}.png`).addTo(mapGaugeInstance);

        const navIcon = L.divIcon({
            className: 'nav-marker',
            html: `<svg width="24" height="24" viewBox="0 0 24 24" style="fill: var(--accent); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>`,
            iconSize: [24, 24], iconAnchor: [12, 12]
        });

        globalGpsMarkerBg = L.marker(moscowCenter, { icon: navIcon }).addTo(mapBgInstance);
        globalGpsMarkerGauge = L.marker(moscowCenter, { icon: navIcon }).addTo(mapGaugeInstance);

        // ЖЕСТКАЯ СИНХРОНИЗАЦИЯ: Фоновая карта следует за мини-картой при ручном перемещении
        mapGaugeInstance.on('move', () => {
            if(mapBgInstance) {
                mapBgInstance.setView(mapGaugeInstance.getCenter(), mapGaugeInstance.getZoom(), { animate: false });
            }
        });

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(position => {
                if (isStartupTesting) return; 

                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const pArray = [lat, lng];

                mapGaugeInstance.setView(pArray); // Обновляем мини-карту (а фоновая подтянется автоматически из события 'move')
                globalGpsMarkerBg.setLatLng(pArray);
                globalGpsMarkerGauge.setLatLng(pArray);

                if (position.coords.speed !== null && position.coords.speed > 0) {
                    currentSpeedKmh = position.coords.speed * 3.6;
                    document.getElementById('gpsStatus').innerHTML = "GPS<br>LIVE";
                    document.getElementById('gpsStatus').style.borderColor = "var(--accent)";
                } else {
                    currentSpeedKmh = 0;
                    document.getElementById('gpsStatus').innerHTML = "GPS<br>STOP";
                }
                
                let limit = 60;
                if (currentSpeedKmh > 82) limit = 110; else if (currentSpeedKmh > 52) limit = 90;
                document.getElementById('signSpeed').innerText = limit;
            }, err => {
                if (!isStartupTesting) document.getElementById('gpsStatus').innerHTML = "NO<br>GPS";
            }, { enableHighAccuracy: true });
        }
    }

    function triggerLexusShiftFlash() {
        const speedRing = document.getElementById('speedSvgRing');
        const tachRing = document.getElementById('tachSvgRing');
        const gearText = document.getElementById('gearContainer');

        speedRing.classList.add('shift-flash');
        tachRing.classList.add('shift-flash');
        gearText.style.transform = "scale(1.18)";

        setTimeout(() => {
            speedRing.classList.remove('shift-flash');
            tachRing.classList.remove('shift-flash');
            gearText.style.transform = "scale(1.0)";
        }, 220);
    }

    function liveRenderEngine() {
        let displayGear = 'P';

        if (isStartupTesting) {
            displayGear = document.getElementById('gearNum').innerText;
        } else {
            if (!isObdActive) {
                currentRpm = 0;
                displayGear = currentSpeedKmh > 0 ? 'D' : 'P';
                
                document.getElementById('coolant').innerText = '--';
                document.getElementById('volt').innerText = '--';
                document.getElementById('oil').innerText = '--';
                document.getElementById('fuelFlow').innerText = '--';
                document.getElementById('obdRpm').innerText = '--';
                document.getElementById('throttle').innerText = '--';
            } else {
                document.getElementById('coolant').innerText = '90';
                document.getElementById('volt').innerText = '14.1V';
                document.getElementById('oil').innerText = '95';
                
                if (currentSpeedKmh === 0) {
                    currentRpm = 750 + Math.sin(Date.now() / 600) * 10; 
                    displayGear = 'P';
                    document.getElementById('fuelFlow').innerText = '0.8 л/ч';
                    document.getElementById('throttle').innerText = '0%';
                } else {
                    const engineData = calculateEngineMetrics(currentSpeedKmh);
                    currentRpm = engineData.rpm;
                    displayGear = engineData.gear;
                    document.getElementById('fuelFlow').innerText = '8.4 л/100';
                    document.getElementById('throttle').innerText = Math.round(10 + (currentSpeedKmh / 5)) + '%';
                }
                document.getElementById('obdRpm').innerText = Math.round(currentRpm);
            }

            if (displayGear !== lastGear) {
                lastGear = displayGear;
                triggerLexusShiftFlash();
            }
            document.getElementById('gearNum').innerText = displayGear;
        }

        // Заполнение шкал адаптировано под радиус 91 (коэффициент 413)
        const speedOffset = (currentSpeedKmh / 220) * 413;
        document.getElementById('speedFill').style.strokeDasharray = `${speedOffset} 600`;
        document.getElementById('speedNum').innerText = Math.round(currentSpeedKmh);

        const rpmOffset = (currentRpm / 8000) * 413;
        document.getElementById('rpmFill').style.strokeDasharray = `${rpmOffset} 600`;

        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        requestAnimationFrame(liveRenderEngine);
    }

    window.onload = () => {
        initDualMapSystem();
        liveRenderEngine();
        
        const wrapper = document.getElementById('globalUiWrapper');
        wrapper.addEventListener('animationend', (e) => {
            if (e.animationName === 'powerOnIgnition') {
                wrapper.style.animation = 'none';
                wrapper.style.transform = `scale(${globalPageScale})`; 
            }
        });

        setTimeout(() => {
            runDashboardStartupTest();
        }, 150);
        
        resetHideControlsTimer();
    };
</script>
</body>
</html>
