<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CarPlay Light">
    
    <title>CarPlay Premium Light Cockpit</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-grey: #8e8e93;
            --neon-blue: #00bfff;
            --neon-pink: #ff2d55;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: linear-gradient(135deg, #e5e5ea 0%, #f2f2f7 100%);
            user-select: none; -webkit-user-select: none;
        }

        /* Эффект мягкого неонового эмбиент-свечения на заднем плане */
        .ambient-glow {
            position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(160px); opacity: 0.4; z-index: 1; pointer-events: none;
        }
        .glow-left { top: 20%; left: -10%; background: var(--neon-blue); }
        .glow-right { bottom: 10%; right: -10%; background: var(--neon-pink); }

        /* Основной контейнер */
        .dashboard-wrapper {
            position: relative; width: 100%; height: 100%; z-index: 2;
            display: grid;
            grid-template-columns: 1fr 480px 1fr;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
        }

        /* Общий стиль премиального «стекла» Apple */
        .apple-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06), 
                        inset 0 1px 0 rgba(255,255,255,0.5);
            color: var(--text-main);
        }

        /* Верхняя панель управления (Док) */
        .apple-dock {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; padding: 6px 12px; border-radius: 99px; z-index: 1000;
        }

        .apple-btn {
            background: rgba(0, 0, 0, 0.05); border: none; color: var(--text-main);
            padding: 8px 20px; border-radius: 99px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
        }
        .apple-btn:active { transform: scale(0.95); background: rgba(0, 0, 0, 0.1); }
        .apple-btn.active { background: var(--apple-blue); color: #fff; }

        /* Боковые колодцы приборов (Круглые) */
        .gauge-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }
        
        .gauge-svg { width: 340px; height: 340px; transform: rotate(-90deg); }
        .gauge-track { fill: none; stroke: rgba(0,0,0,0.04); stroke-width: 14; }
        .gauge-dynamic { 
            fill: none; stroke-width: 14; stroke-linecap: round; 
            transition: stroke-dashoffset 0.16s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .gauge-center-data {
            position: absolute; text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .gauge-value { font-size: 76px; font-weight: 700; letter-spacing: -2px; color: var(--text-main); line-height: 1; }
        .gauge-unit { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-top: 4px; text-transform: uppercase; }

        /* Центральный столб: Плеер + Параметры под ним */
        .center-column {
            display: flex; flex-direction: column; gap: 20px; width: 100%; height: 460px; justify-content: center;
        }

        /* Музыкальный Плеер (Светлый стиль) */
        .music-widget {
            padding: 20px; display: flex; align-items: center; gap: 20px; height: 140px; box-sizing: border-box;
        }
        .album-art-container {
            width: 90px; height: 90px; position: relative;
        }
        #album-art {
            width: 100%; height: 100%; border-radius: 14px; object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background: linear-gradient(135deg, #d1d1d6, #e5e5ea);
        }
        .track-metadata { flex: 1; overflow: hidden; }
        .track-name { font-size: 20px; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 14px; color: var(--text-sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .player-controls { display: flex; gap: 24px; margin-top: 12px; align-items: center; }
        .player-controls button { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-main); padding: 0; }
        .player-controls button:active { transform: scale(0.85); }

        /* Сетка Датчиков авто */
        .metrics-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1;
        }
        .metric-card {
            padding: 16px 20px; display: flex; flex-direction: column; justify-content: center;
        }
        .metric-label { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
        .metric-value { font-size: 28px; font-weight: 700; color: var(--text-main); }

        /* Системные бары (Верх/Низ) */
        .status-info {
            position: absolute; font-size: 13px; font-weight: 600; color: var(--text-sub); z-index: 10;
        }
        .status-left { top: 25px; left: 40px; }
        .status-right { top: 25px; right: 40px; }
        .status-bottom { bottom: 25px; left: 50%; transform: translateX(-50%); font-size: 14px; color: var(--text-main); }

        /* Модальные окна */
        .apple-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 360px; padding: 24px; z-index: 2000; box-sizing: border-box;
        }
        .modal-title { margin: 0 0 16px 0; font-size: 18px; font-weight: 700; text-align: center; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; margin: 14px 0; font-size: 14px; font-weight: 600; }
        .modal-row input, .modal-row select {
            background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); color: var(--text-main);
            padding: 6px 12px; border-radius: 10px; width: 100px; text-align: center; font-weight: 600; outline: none;
        }

        .spinner {
            width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.05); border-radius: 50%;
            border-top-color: var(--apple-blue); animation: spin 0.8s linear infinite; margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="ambient-glow glow-left"></div>
    <div class="ambient-glow glow-right"></div>

    <div class="status-info status-left">📶 CarPlay Light</div>
    <div class="status-info status-right" id="connection-indicator">📡 BLE STANDBY</div>

    <div class="apple-glass apple-dock">
        <button class="apple-btn" id="btn-connect">ELM327 BLE</button>
        <button class="apple-btn" id="btn-settings">Настройки</button>
        <button class="apple-btn" id="btn-fs">Экран</button>
    </div>

    <div class="dashboard-wrapper">
        
        <div class="gauge-container">
            <svg class="gauge-svg">
                <circle class="gauge-track" cx="170" cy="170" r="145"></circle>
                <circle class="gauge-dynamic" id="ring-speed" cx="170" cy="170" r="145" stroke="url(#blue-grad)"></circle>
                <defs>
                    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#0071e3" />
                        <stop offset="100%" stop-color="#00bfff" />
                    </linearGradient>
                </defs>
            </svg>
            <div class="gauge-center-data">
                <div class="gauge-value" id="txt-speed">0</div>
                <div class="gauge-unit" id="txt-speed-unit">км/ч</div>
            </div>
        </div>

        <div class="center-column">
            
            <div class="apple-glass music-widget">
                <div class="album-art-container">
                    <img id="album-art" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23e5e5ea'/><path d='M35 25v35a10 10 0 1 0 10 10V35h25V25H35z' fill='%230071e3'/></svg>">
                </div>
                <div class="track-metadata">
                    <div class="track-name" id="track-name">Яндекс Музыка</div>
                    <div class="track-artist" id="track-artist">Нажмите Play на iPhone</div>
                    <div class="player-controls">
                        <button id="m-prev">⏮</button>
                        <button id="m-play" style="font-size: 28px;">▶️</button>
                        <button id="m-next">⏭</button>
                    </div>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="apple-glass metric-card">
                    <div class="metric-label">ТЕМП. ОЖ</div>
                    <div class="metric-value" id="m-coolant">40 °C</div>
                </div>
                <div class="apple-glass metric-card">
                    <div class="metric-label">Вольтметр</div>
                    <div class="metric-value" id="m-volt" style="color: var(--apple-blue);">12.2 V</div>
                </div>
                <div class="apple-glass metric-card">
                    <div class="metric-label">Темп. Масла</div>
                    <div class="metric-value" id="m-oil">50 °C</div>
                </div>
                <div class="apple-glass metric-card">
                    <div class="metric-label">Борт сеть</div>
                    <div class="metric-value" id="m-board" style="color: #34c759;">14.1 V</div>
                </div>
            </div>
        </div>

        <div class="gauge-container">
            <svg class="gauge-svg">
                <circle class="gauge-track" cx="170" cy="170" r="145"></circle>
                <circle class="gauge-dynamic" id="ring-rpm" cx="170" cy="170" r="145" stroke="url(#pink-grad)"></circle>
                <defs>
                    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff2d55" />
                        <stop offset="100%" stop-color="#ff5e7e" />
                    </linearGradient>
                </defs>
            </svg>
            <div class="gauge-center-data">
                <div class="gauge-value" id="txt-gear">1</div>
                <div class="gauge-unit" id="txt-mode" style="color: #34c759;">Comfort</div>
            </div>
        </div>

    </div>

    <div class="status-info status-bottom" id="txt-odometer">Всего: 142830 км | Рейс: 0.0 км</div>

    <div class="apple-glass apple-modal" id="modal-ble">
        <div class="modal-title" id="ble-title">Поиск OBDII...</div>
        <div class="spinner" id="ble-spn"></div>
        <div id="ble-dev-info" style="display:none; text-align:center; margin-bottom:15px;">
            <span style="font-size:12px; color:var(--text-sub);">Выбран адаптер:</span>
            <div id="ble-dev-name" style="font-size:18px; font-weight:700; color:var(--apple-blue);">---</div>
        </div>
        <button class="apple-btn active" id="modal-ble-ok" style="width:100%; display:none; padding:12px 0;">Подключиться</button>
        <button class="apple-btn" id="modal-ble-cancel" style="width:100%; margin-top:8px; color:#ff3b30;">Отмена</button>
    </div>

    <div class="apple-glass apple-modal" id="modal-settings">
        <div class="modal-title">Параметры авто</div>
        <div class="modal-row">
            <label>Диски (R)</label>
            <input type="number" id="cfg-wheel" value="15">
        </div>
        <div class="modal-row">
            <label>Редуктор ГП</label>
            <input type="number" id="cfg-gear" value="3.9" step="0.1">
        </div>
        <div class="modal-row">
            <label>Скорость в</label>
            <select id="cfg-units">
                <option value="kmh">км/ч</option>
                <option value="mph">mph</option>
            </select>
        </div>
        <button class="apple-btn active" id="modal-settings-close" style="width:100%; margin-top:15px; padding:12px 0;">Сохранить</button>
    </div>

<script>
    const state = {
        speed: 0, rpm: 0, coolant: 40, oilTemp: 50, voltage: 12.2, trip: 0.0, gear: 1, mode: 'Comfort',
        targets: { speed: 0, rpm: 0, coolant: 88, oilTemp: 92, voltage: 14.1 },
        config: { wheelR: 15, finalGear: 3.9, units: 'kmh' },
        isConnected: false, bleChar: null, isPlaying: false, simStep: 0
    };

    // Параметры SVG шкал (длина окружности радиуса 145 = 911)
    const CIRCUMFERENCE = 2 * Math.PI * 145;
    const speedRing = document.getElementById('ring-speed');
    const rpmRing = document.getElementById('ring-rpm');

    [speedRing, rpmRing].forEach(r => {
        r.style.strokeDasharray = CIRCUMFERENCE;
        r.style.strokeDashoffset = CIRCUMFERENCE;
    });

    function setProgress(ring, current, max) {
        const progress = Math.min(Math.max(current / max, 0), 1);
        ring.style.strokeDashoffset = CIRCUMFERENCE - (progress * CIRCUMFERENCE);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    /**
     * СИСТЕМНЫЙ СИМУЛЯТОР ДВИЖЕНИЯ (активен, пока адаптер не подключен)
     */
    function engineSimulation() {
        if (state.isConnected) return;
        state.simStep += 0.02;

        state.targets.rpm = 800 + (Math.sin(state.simStep) + 1) * 2000;
        state.targets.speed = (state.targets.rpm / (state.config.finalGear * 12)) * (state.config.wheelR / 15) * 3.6;
        state.trip += (state.targets.speed / 120000);

        if (state.targets.speed > 80) { state.gear = 4; state.mode = 'Sport'; }
        else if (state.targets.speed > 40) { state.gear = 3; state.mode = 'Comfort'; }
        else if (state.targets.speed > 15) { state.gear = 2; state.mode = 'Comfort'; }
        else { state.gear = 1; state.mode = 'Comfort'; }
    }

    /**
     * ЦИКЛ ОБНОВЛЕНИЯ ИНТЕРФЕЙСА (Интерполяция данных)
     */
    function updateFrame() {
        engineSimulation();

        state.speed = lerp(state.speed, state.targets.speed, 0.15);
        state.rpm = lerp(state.rpm, state.targets.rpm, 0.15);
        state.coolant = lerp(state.coolant, state.targets.coolant, 0.02);
        state.oilTemp = lerp(state.oilTemp, state.targets.oilTemp, 0.02);
        state.voltage = lerp(state.voltage, state.targets.voltage, 0.02);

        // Обновление текстовых узлов
        let outSpeed = state.config.units === 'mph' ? state.speed * 0.621371 : state.speed;
        document.getElementById('txt-speed').innerText = Math.round(outSpeed);
        document.getElementById('txt-gear').innerText = state.gear;
        document.getElementById('txt-mode').innerText = state.mode;
        document.getElementById('txt-mode').style.color = state.mode === 'Sport' ? 'var(--neon-pink)' : '#34c759';

        document.getElementById('m-coolant').innerText = `${Math.round(state.coolant)} °C`;
        document.getElementById('m-oil').innerText = `${Math.round(state.oilTemp)} °C`;
        document.getElementById('m-volt').innerText = `${state.voltage.toFixed(1)} V`;

        document.getElementById('txt-odometer').innerText = `Всего: 142830 км | Рейс: ${state.trip.toFixed(1)} км`;

        // Обновление прогресс-колец SVG
        setProgress(speedRing, state.speed, 220);
        setProgress(rpmRing, state.rpm, 7000);

        requestAnimationFrame(updateFrame);
    }

    /**
     * ПЕРЕХВАТ МЕДИА-СЕССИИ APPLE (Яндекс Музыка / Apple Music)
     */
    const playBtn = document.getElementById('m-play');
    let audioContextInitialized = false;

    function initMediaSession() {
        if (audioContextInitialized) return;
        audioContextInitialized = true;

        // Создаем фиктивный аудио-узел для разблокировки аудио-подсистемы iOS
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => { state.isPlaying = true; playBtn.innerText = "⏸"; });
            navigator.mediaSession.setActionHandler('pause', () => { state.isPlaying = false; playBtn.innerText = "▶️"; });

            // Опрашиваем систему телефона на предмет активного трека
            setInterval(() => {
                if (navigator.mediaSession.metadata) {
                    document.getElementById('track-name').innerText = navigator.mediaSession.metadata.title;
                    document.getElementById('track-artist').innerText = navigator.mediaSession.metadata.artist;
                    if (navigator.mediaSession.metadata.artwork?.length > 0) {
                        document.getElementById('album-art').src = navigator.mediaSession.metadata.artwork[0].src;
                    }
                }
            }, 1000);
        }
    }

    playBtn.addEventListener('click', () => {
        initMediaSession();
        state.isPlaying = !state.isPlaying;
        playBtn.innerText = state.isPlaying ? "⏸" : "▶️";
    });

    /**
     * СВЯЗЬ ПО ПРОТОКОЛУ ELM327 (Web Bluetooth)
     */
    let bleDevice = null;
    let bleRawBuffer = "";

    document.getElementById('btn-connect').addEventListener('click', async () => {
        const modal = document.getElementById('modal-ble');
        modal.style.display = 'block';
        document.getElementById('ble-title').innerText = "Поиск адаптера...";
        document.getElementById('ble-spn').style.display = 'block';
        document.getElementById('ble-dev-info').style.display = 'none';
        document.getElementById('modal-ble-ok').style.display = 'none';

        try {
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'OBD' }, { namePrefix: 'ELM' }, { namePrefix: 'V-LINK' }],
                optionalServices: [0xFFE0, '0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            document.getElementById('ble-spn').style.display = 'none';
            document.getElementById('ble-dev-info').style.display = 'block';
            document.getElementById('ble-dev-name').innerText = bleDevice.name || "OBDII Interface";
            document.getElementById('modal-ble-ok').style.display = 'block';
            document.getElementById('ble-title').innerText = "Адаптер найден";

        } catch (e) {
            modal.style.display = 'none';
            alert("Используйте специальный браузер Bluefy для iOS для работы Bluetooth!");
        }
    });

    document.getElementById('modal-ble-ok').addEventListener('click', async () => {
        if (!bleDevice) return;
        try {
            document.getElementById('modal-ble-ok').innerText = "Сопряжение...";
            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(0xFFE0);
            const characteristic = await service.getCharacteristic(0xFFE1);
            
            state.bleChar = characteristic;
            state.isConnected = true;

            document.getElementById('modal-ble').style.display = 'none';
            document.getElementById('connection-indicator').innerText = "🟢 OBD ACTIVE";
            document.getElementById('btn-connect').classList.add('active');
            document.getElementById('btn-connect').innerText = "OBD Active";

            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', parseOBDData);
            
            // Запуск циклического опроса ЭБУ машины
            setInterval(async () => {
                if (!state.isConnected) return;
                try {
                    // Чередуем запросы: Обороты (010C) и Скорость (010D)
                    let cmd = (Math.random() > 0.5) ? "010C\r" : "010D\r";
                    await state.bleChar.writeValue(new TextEncoder().encode(cmd));
                } catch (err) { state.isConnected = false; }
            }, 2000);

        } catch (err) {
            document.getElementById('ble-title').innerText = "Ошибка шины авто";
        }
    });

    document.getElementById('modal-ble-cancel').addEventListener('click', () => {
        document.getElementById('modal-ble').style.display = 'none';
    });

    function parseOBDData(event) {
        bleRawBuffer += new TextDecoder().decode(event.target.value);
        if (bleRawBuffer.includes('\r') || bleRawBuffer.includes('>')) {
            let lines = bleRawBuffer.split(/[\r\n>]+/);
            bleRawBuffer = lines.pop();

            lines.forEach(line => {
                let clean = line.replace(/\s+/g, '').toUpperCase();
                if (clean.includes("410C")) { // Ответ по оборотам
                    let idx = clean.indexOf("410C") + 4;
                    let a = parseInt(clean.substr(idx, 2), 16);
                    let b = parseInt(clean.substr(idx+2, 2), 16);
                    if (!isNaN(a) && !isNaN(b)) state.targets.rpm = ((a * 256) + b) / 4;
                }
                if (clean.includes("410D")) { // Ответ по скорости
                    let idx = clean.indexOf("410D") + 4;
                    let a = parseInt(clean.substr(idx, 2), 16);
                    if (!isNaN(a)) state.targets.speed = a;
                }
            });
        }
    }

    /**
     * ОКНО НАСТРОЕК И ЭКРАННЫЕ ДЕЙСТВИЯ
     */
    document.getElementById('btn-settings').addEventListener('click', () => {
        document.getElementById('modal-settings').style.display = 'block';
    });

    document.getElementById('modal-settings-close').addEventListener('click', () => {
        state.config.wheelR = parseFloat(document.getElementById('cfg-wheel').value) || 15;
        state.config.finalGear = parseFloat(document.getElementById('cfg-gear').value) || 3.9;
        state.config.units = document.getElementById('cfg-units').value;
        document.getElementById('txt-speed-unit').innerText = state.config.units === 'kmh' ? 'км/ч' : 'mph';
        document.getElementById('modal-settings').style.display = 'none';
    });

    document.getElementById('btn-fs').addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    });

    // Старт
    window.addEventListener('DOMContentLoaded', () => {
        updateFrame();
    });
</script>
</body>
</html>
