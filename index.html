<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CarPlay Dash">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Apple CarPlay Premium Liquid Dashboard v3.5</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        #app-viewport {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000;
        }

        canvas {
            display: block; width: 100%; height: 100%;
            background: #f5f5f7;
        }

        /* Навигационная панель управления iOS с поддержкой автоскрытия */
        .apple-nav {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 8px; border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            opacity: 1;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .apple-nav.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .apple-btn {
            background: transparent; border: none; color: #0071e3;
            padding: 10px 24px; border-radius: 99px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }
        .apple-btn:hover { background: rgba(0, 113, 227, 0.08); }
        .apple-btn.active { background: #0071e3; color: #fff; box-shadow: 0 4px 12px rgba(0,113,227,0.3); }

        /* Общие стили для CarPlay-карточек (Настройки / Bluetooth) */
        .apple-card {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 24px; padding: 30px; color: #1d1d1f; z-index: 200; width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .apple-card h3 { margin: 0 0 20px 0; font-size: 20px; font-weight: 600; text-align: center; letter-spacing: -0.5px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 18px 0; font-size: 15px; font-weight: 500; }
        .setting-item input, .setting-item select {
            background: rgba(255, 255, 255, 0.8); border: 1px solid #d2d2d7; color: #1d1d1f;
            padding: 8px 12px; border-radius: 10px; width: 110px; text-align: center; font-weight: 600;
            outline: none; font-size: 14px;
        }
        .setting-item input[type="range"] { padding: 0; width: 120px; }

        /* Анимированный индикатор загрузки Apple */
        .ios-spinner {
            display: inline-block; width: 40px; height: 40px;
            border: 3px solid rgba(0, 113, 227, 0.1);
            border-radius: 50%; border-top-color: #0071e3;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app-viewport">
    <div class="apple-nav" id="main-nav">
        <button class="apple-btn" id="connect-elm">ELM327 BLE</button>
        <button class="apple-btn" id="open-panel">Настройки</button>
        <button class="apple-btn" id="go-fs">Экран</button>
    </div>

    <canvas id="liquidCockpit"></canvas>

    <div class="apple-card" id="ble-discovery-panel">
        <h3 id="ble-status-title">Поиск устройств...</h3>
        <div id="ble-loader" style="text-align:center; margin: 20px 0;">
            <div class="ios-spinner"></div>
        </div>
        <div id="device-info" style="display:none; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <div style="font-size: 12px; color: #86868b; text-transform: uppercase; margin-bottom: 5px;">Выбранный адаптер:</div>
            <div id="target-device-name" style="font-weight: 600; font-size: 18px;">---</div>
        </div>
        <button class="apple-btn active" id="confirm-ble" style="width:100%; display:none; padding: 14px 0;">Подключиться</button>
        <button class="apple-btn" id="cancel-ble" style="width:100%; margin-top: 10px; color: #ff3b30;">Отмена</button>
    </div>

    <div class="apple-card" id="settings-panel">
        <h3>Параметры автомобиля</h3>
        <div class="setting-item">
            <label>Размер дисков (R)</label>
            <input type="number" id="val-wheel" value="15" min="13" max="20">
        </div>
        <div class="setting-item">
            <label>Главная пара КПП</label>
            <input type="number" id="val-gear" value="3.9" step="0.1" min="3.1" max="4.5">
        </div>
        <div class="setting-item">
            <label>Яркость стекла</label>
            <input type="range" id="val-bright" min="20" max="100" value="100">
        </div>
        <div class="setting-item">
            <label>Система мер</label>
            <select id="val-units">
                <option value="kmh">км/ч</option>
                <option value="mph">mph</option>
            </select>
        </div>
        <button class="apple-btn active" id="close-panel" style="width:100%; margin-top:20px; padding: 14px 0; font-size:15px;">Сохранить конфигурацию</button>
    </div>
</div>

<script>
    const THEME = {
        TEXT_DARK: '#1d1d1f',
        TEXT_LIGHT: '#86868b',
        LINK_BLUE: '#0071e3',
        SYSTEM_GREEN: '#34c759',
        SYSTEM_RED: '#ff3b30'
    };

    const state = {
        rpm: 0, speed: 0, coolant: 40, oilTemp: 50, voltage: 12.2,
        odometer: 142830, trip: 0.0, gear: '1', mode: 'Comfort',
        config: { wheelR: 15, finalGear: 3.9, brightness: 1.0, units: 'kmh' },
        targets: { rpm: 0, speed: 0, coolant: 90, oilTemp: 92, voltage: 14.1 },
        isStartup: true, startupProgress: 0,
        bleDevice: null, bleChar: null, isConnected: false,
        fluidPhase: 0
    };

    // Глобальные переменные для BLE и интерфейса
    let bleBuffer = "";
    let tempDevice = null;
    let navHideTimeout;

    const speedTicks = [0, 20, 40, 60, 80, 100, 120, 140, 160, 180, 200, 220];
    const rpmTicks = [0, 1, 2, 3, 4, 5, 6, 7, 8];

    const canvas = document.getElementById('liquidCockpit');
    const ctx = canvas.getContext('2d');

    // Интерфейсные элементы BLE
    const blePanel = document.getElementById('ble-discovery-panel');
    const bleTitle = document.getElementById('ble-status-title');
    const bleLoader = document.getElementById('ble-loader');
    const deviceInfo = document.getElementById('device-info');
    const deviceNameLabel = document.getElementById('target-device-name');
    const confirmBleBtn = document.getElementById('confirm-ble');

    function lerp(a, b, t) { return a + (b - a) * t; }

    /**
     * АДАПТИВНЫЙ РАСЧЕТ ХОЛСТА (Защита от рамок и искажений)
     */
    function resizeCanvas() {
        const aspect = window.innerWidth / window.innerHeight;
        canvas.height = 1080;
        canvas.width = 1080 * aspect;
    }

    /**
     * ОСНОВНОЙ ЦИКЛ ОБНОВЛЕНИЯ ЭКРАНА
     */
    function processFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        state.fluidPhase += 0.003;
        drawLiquidBackground();

        // Логика стрелок и данных
        if (state.isStartup) {
            state.startupProgress += 0.012;
            let ratio = Math.sin(state.startupProgress * Math.PI);
            state.rpm = ratio * 7500;
            state.speed = ratio * 210;
            if (state.startupProgress >= 1.0) state.isStartup = false;
        } else {
            state.rpm = lerp(state.rpm, state.targets.rpm, 0.15);
            state.speed = lerp(state.speed, state.targets.speed, 0.15);
            state.coolant = lerp(state.coolant, state.targets.coolant, 0.02);
            state.oilTemp = lerp(state.oilTemp, state.targets.oilTemp, 0.02);
            state.voltage = lerp(state.voltage, state.targets.voltage, 0.02);
            if (!state.isConnected) state.trip += (state.speed / 36000); 
        }

        const startAng = 0.74 * Math.PI;
        const endAng = 2.26 * Math.PI;

        // Расчет относительных координат для ультрашироких экранов телефонов
        const centerX = canvas.width / 2;
        const centerY = 540;
        const widgetW = 560;
        const widgetH = 550;
        const widgetX = centerX - widgetW / 2;

        const lx = widgetX - 290;
        const rx = widgetX + widgetW + 290;
        const radius = 250;

        // ==========================================================
        // ЛЕВЫЙ ПРИБОР — СПИДОМЕТР
        // ==========================================================
        let displaySpeed = state.speed;
        if (state.config.units === 'mph') displaySpeed = state.speed * 0.621371;

        drawGlassBase(lx, centerY, radius);
        drawGaugeTicks(lx, centerY, radius, displaySpeed, 0, 220, startAng, endAng, speedTicks, false);
        
        ctx.fillStyle = THEME.TEXT_DARK; ctx.font = '700 110px -apple-system'; ctx.textAlign = 'center';
        ctx.fillText(Math.round(displaySpeed), lx, centerY + 15);
        ctx.fillStyle = THEME.TEXT_LIGHT; ctx.font = '600 22px -apple-system';
        ctx.fillText(state.config.units === 'kmh' ? 'км/ч' : 'mph', lx, centerY + 70);
        ctx.fillText(`⛽ ${Math.round(450 - state.trip)} км`, lx, centerY + 130);
        
        drawLiquidGlassOverlay(lx, centerY, radius);

        // ==========================================================
        // ПРАВЫЙ ПРИБОР — ТАХОМЕТР
        // ==========================================================
        drawGlassBase(rx, centerY, radius);
        drawGaugeTicks(rx, centerY, radius, state.rpm / 1000, 0, 8, startAng, endAng, rpmTicks, true);
        
        ctx.fillStyle = THEME.TEXT_DARK; ctx.font = '700 130px -apple-system'; ctx.textAlign = 'center';
        ctx.fillText(state.gear, rx, centerY + 25);
        ctx.fillStyle = THEME.SYSTEM_GREEN; ctx.font = '700 24px -apple-system';
        ctx.fillText(state.mode, rx, centerY + 80);
        
        drawLiquidGlassOverlay(rx, centerY, radius);

        // ==========================================================
        // ЦЕНТРАЛЬНЫЙ ВИДЖЕТ — НАВИГАЦИЯ / ХОДОВЫЕ ДАННЫЕ
        // ==========================================================
        drawCentralGlassWidget(widgetX, 240, widgetW, widgetH);

        // Статус-строка
        drawSystemBar(lx, rx, centerX);

        requestAnimationFrame(processFrame);
    }

    function drawLiquidBackground() {
        const p1 = state.fluidPhase;
        const p2 = state.fluidPhase * 1.2;
        
        let g = ctx.createRadialGradient(canvas.width/2, 540, 100, canvas.width/2, 540, canvas.width);
        g.addColorStop(0, '#f5f5f7');
        g.addColorStop(1, '#d2d2d7');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let cx1 = (canvas.width/2) + Math.sin(p1) * 350;
        let cy1 = 540 + Math.cos(p1 * 0.9) * 200;
        let rg1 = ctx.createRadialGradient(cx1, cy1, 10, cx1, cy1, 600);
        rg1.addColorStop(0, 'rgba(0, 113, 227, 0.14)');
        rg1.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = rg1;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let cx2 = (canvas.width/2) + Math.cos(p2) * 450;
        let cy2 = 540 + Math.sin(p2 * 1.1) * 250;
        let rg2 = ctx.createRadialGradient(cx2, cy2, 10, cx2, cy2, 550);
        rg2.addColorStop(0, 'rgba(52, 199, 89, 0.09)');
        rg2.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = rg2;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawGlassBase(cx, cy, r) {
        ctx.save();
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.62)';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.04)'; ctx.shadowBlur = 40; ctx.shadowOffsetY = 12;
        ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)'; ctx.lineWidth = 2.5; ctx.stroke();
        ctx.restore();
    }

    function drawGaugeTicks(cx, cy, r, val, min, max, startAng, endAng, ticks, isRpm) {
        ctx.beginPath(); ctx.arc(cx, cy, r - 30, startAng, endAng);
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)'; ctx.lineWidth = 5; ctx.stroke();

        if (val > min) {
            let curAng = startAng + ((val - min) / (max - min)) * (endAng - startAng);
            ctx.beginPath(); ctx.arc(cx, cy, r - 30, startAng, curAng);
            ctx.strokeStyle = THEME.LINK_BLUE; ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.stroke();
        }

        ticks.forEach(t => {
            let ang = startAng + ((t - min) / (max - min)) * (endAng - startAng);
            let isRed = (isRpm && t >= 7);

            let x1 = cx + (r - 12) * Math.cos(ang);
            let y1 = cy + (r - 12) * Math.sin(ang);
            let x2 = cx + (r - 22) * Math.cos(ang);
            let y2 = cy + (r - 22) * Math.sin(ang);

            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.strokeStyle = isRed ? THEME.SYSTEM_RED : 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 2; ctx.stroke();

            let tx = cx + (r - 45) * Math.cos(ang);
            let ty = cy + (r - 45) * Math.sin(ang) + 2;
            ctx.fillStyle = isRed ? THEME.SYSTEM_RED : THEME.TEXT_DARK;
            ctx.font = '600 18px -apple-system'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(t, tx, ty);
        });
    }

    function drawLiquidGlassOverlay(cx, cy, r) {
        ctx.save();
        ctx.beginPath(); ctx.arc(cx, cy, r - 2, 0, Math.PI * 2);
        ctx.clip();

        let glassGrad = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
        glassGrad.addColorStop(0, 'rgba(255, 255, 255, 0.55)');
        glassGrad.addColorStop(0.25, 'rgba(255, 255, 255, 0.22)');
        glassGrad.addColorStop(0.45, 'rgba(255, 255, 255, 0.0)');
        ctx.beginPath(); ctx.arc(cx, cy - r * 0.2, r * 1.35, 0, Math.PI * 2);
        ctx.fillStyle = glassGrad; ctx.fill();

        let reflexGrad = ctx.createRadialGradient(cx, cy + r * 0.8, 10, cx, cy + r * 0.8, r * 0.85);
        reflexGrad.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
        reflexGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = reflexGrad; ctx.fill();
        ctx.restore();
    }

    function drawCentralGlassWidget(x, y, w, h) {
        ctx.save();
        ctx.beginPath(); ctx.roundRect(x, y, w, h, 28);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.52)';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.03)'; ctx.shadowBlur = 40; ctx.shadowOffsetY = 10;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)'; ctx.lineWidth = 1.5; ctx.stroke();

        ctx.beginPath(); ctx.roundRect(x + 20, y + 20, w - 40, 180, 18);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.65)'; ctx.fill();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.stroke();

        ctx.fillStyle = THEME.LINK_BLUE; ctx.font = '700 38px -apple-system'; ctx.textAlign = 'left';
        ctx.fillText("↩  2.8 км", x + 50, y + 80);
        ctx.fillStyle = THEME.TEXT_DARK; ctx.font = '600 22px -apple-system';
        ctx.fillText("ул. Коммунистическая", x + 50, y + 130);

        let gridY = y + 255;
        let col1 = x + 45;
        let col2 = x + 305;

        renderMetricCell(col1, gridY, "ТЕМП. ОЖ", `${Math.round(state.coolant)} °C`, THEME.TEXT_DARK);
        renderMetricCell(col2, gridY, "ВОЛЬТМЕТР", `${state.voltage.toFixed(1)} V`, THEME.LINK_BLUE);
        renderMetricCell(col1, gridY + 125, "ТЕМП. МАСЛА", `${Math.round(state.oilTemp)} °C`, THEME.TEXT_DARK);
        renderMetricCell(col2, gridY + 125, "БОРТ СЕТЬ", "14.1 V", THEME.SYSTEM_GREEN);

        ctx.beginPath(); ctx.roundRect(x, y, w, h, 28); ctx.clip();
        let diagGrad = ctx.createLinearGradient(x, y, x + w, y + h);
        diagGrad.addColorStop(0, 'rgba(255,255,255,0.22)');
        diagGrad.addColorStop(0.35, 'rgba(255,255,255,0.0)');
        ctx.fillStyle = diagGrad; ctx.fillRect(x, y, w, h);
        ctx.restore();
    }

    function renderMetricCell(x, y, label, val, color) {
        ctx.fillStyle = THEME.TEXT_LIGHT; ctx.font = '700 13px -apple-system';
        ctx.fillText(label, x, y);
        ctx.fillStyle = color; ctx.font = '700 34px -apple-system';
        ctx.fillText(val, x, y + 42);
    }

    function drawSystemBar(lx, rx, centerX) {
        ctx.save();
        ctx.font = '600 20px -apple-system'; ctx.fillStyle = THEME.TEXT_DARK;

        ctx.textAlign = 'left'; ctx.fillText("📶 LADA Link", lx, 150);
        ctx.textAlign = 'center'; ctx.fillText("LTE  22°C", centerX, 150);
        ctx.textAlign = 'right'; 
        ctx.fillStyle = state.isConnected ? THEME.LINK_BLUE : THEME.TEXT_LIGHT;
        ctx.fillText(state.isConnected ? "🟢 OBDII ACTIVE" : "📡 BLE READY", rx, 150);

        ctx.textAlign = 'center'; ctx.fillStyle = THEME.TEXT_DARK;
        ctx.font = '600 22px -apple-system';
        ctx.fillText(`Всего: ${state.odometer + Math.floor(state.trip)} км  |  Поездка: ${state.trip.toFixed(1)} км`, centerX, 890);
        ctx.restore();
    }

    /**
     * СИМУЛЯЦИЯ ДЛЯ ТЕСТОВ (Автоматически выключается при сигнале с ELM)
     */
    let simClock = 0;
    function runDemoSimulation() {
        if (state.isStartup || state.isConnected) return;
        simClock += 0.02;

        let gearFactor = state.config.finalGear / 3.9;
        let wheelFactor = state.config.wheelR / 15;

        state.targets.rpm = 850 + (Math.sin(simClock) + 1.1) * 2300 * gearFactor;
        state.targets.speed = (state.targets.rpm / (state.config.finalGear * 12)) * wheelFactor * 3.6;
        
        state.targets.coolant = 89 + Math.sin(simClock * 0.1) * 1.5;
        state.targets.oilTemp = 93 + Math.cos(simClock * 0.08) * 1.2;
        state.targets.voltage = 14.1 + Math.sin(simClock * 2) * 0.05;

        if (state.targets.speed > 95) { state.gear = '4'; state.mode = 'Dynamic'; }
        else if (state.targets.speed > 55) { state.gear = '3'; state.mode = 'Comfort'; }
        else if (state.targets.speed > 25) { state.gear = '2'; state.mode = 'Comfort'; }
        else { state.gear = '1'; state.mode = 'Comfort'; }
    }

    /**
     * АВТОМАТИЧЕСКОЕ СКРЫТИЕ ИНТЕРФЕЙСА УПРАВЛЕНИЯ
     */
    function resetNavTimeout() {
        const nav = document.getElementById('main-nav');
        nav.classList.remove('hidden');
        clearTimeout(navHideTimeout);
        
        navHideTimeout = setTimeout(() => {
            const panel = document.getElementById('settings-panel');
            if (panel.style.display !== 'block' && blePanel.style.display !== 'block' && state.isStartup === false) {
                nav.classList.add('hidden');
            }
        }, 3000);
    }

    window.addEventListener('mousemove', resetNavTimeout);
    window.addEventListener('touchstart', resetNavTimeout);
    window.addEventListener('click', resetNavTimeout);

    /**
     * ПОДДКЛЮЧЕНИЕ И ВЫБОР УСТРОЙСТВА ELM327 BLE
     */
    document.getElementById('connect-elm').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (state.isConnected) return;

        // Открываем CarPlay панель сканирования
        blePanel.style.display = 'block';
        bleTitle.innerText = "Выберите устройство";
        bleLoader.style.display = 'block';
        deviceInfo.style.display = 'none';
        confirmBleBtn.style.display = 'none';

        try {
            // Вызываем окно выбора Bluetooth устройств
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'OBD' }, { namePrefix: 'ELM' }, { namePrefix: 'V-LINK' }, { namePrefix: 'IOS' }],
                optionalServices: [0xFFE0, '0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            // Устройство успешно захвачено, выводим инфо на плашку подтверждения
            tempDevice = device;
            bleLoader.style.display = 'none';
            deviceInfo.style.display = 'block';
            deviceNameLabel.innerText = device.name || "OBDII Адаптер";
            confirmBleBtn.style.display = 'block';
            bleTitle.innerText = "Устройство готово";

        } catch (err) {
            console.log("Сканирование прервано пользователем");
            blePanel.style.display = 'none';
        }
    });

    // Окончательное сопряжение и открытие потока данных
    confirmBleBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!tempDevice) return;
        
        try {
            confirmBleBtn.innerText = "Сопряжение...";
            const server = await tempDevice.gatt.connect();
            const service = await server.getPrimaryService(0xFFE0);
            const characteristic = await service.getCharacteristic(0xFFE1);
            
            state.bleDevice = tempDevice;
            state.bleChar = characteristic;
            state.isConnected = true;

            bleTitle.innerText = "Успешно подключено";
            confirmBleBtn.style.backgroundColor = THEME.SYSTEM_GREEN;
            confirmBleBtn.innerText = "Готово";
            
            setTimeout(() => {
                blePanel.style.display = 'none';
                document.getElementById('connect-elm').innerText = "OBD Active";
                document.getElementById('connect-elm').classList.add('active');
            }, 1000);

            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', handleOBDStream);
            startPollingCycle();

        } catch (err) {
            bleTitle.innerText = "Ошибка шины данных";
            confirmBleBtn.innerText = "Повторить попытку";
            console.error(err);
        }
    });

    document.getElementById('cancel-ble').addEventListener('click', (e) => {
        e.stopPropagation();
        blePanel.style.display = 'none';
        tempDevice = null;
    });

    function startPollingCycle() {
        setInterval(async () => {
            if (!state.isConnected) return;
            try {
                // Запрашиваем поочередно PID скорости и оборотов
                let cmd = (Math.random() > 0.5) ? "010C\r" : "010D\r";
                await state.bleChar.writeValue(new TextEncoder().encode(cmd));
            } catch (e) { 
                state.isConnected = false;
                document.getElementById('connect-elm').classList.remove('active');
                document.getElementById('connect-elm').innerText = "ELM327 BLE";
            }
        }, 220);
    }

    /**
     * ПОТОКОВЫЙ БУФЕР ОПРОСА OBDII (Защита данных от обрывов)
     */
    function handleOBDStream(event) {
        bleBuffer += new TextDecoder().decode(event.target.value);
        if (bleBuffer.includes('\r') || bleBuffer.includes('>')) {
            let lines = bleBuffer.split(/[\r\n>]+/);
            bleBuffer = lines.pop(); // Оставляем кусок незавершенного пакета
            
            lines.forEach(line => {
                let clean = line.replace(/\s+/g, '').toUpperCase();
                // Парсинг RPM
                if (clean.includes("410C")) {
                    let pos = clean.indexOf("410C") + 4;
                    let a = parseInt(clean.substr(pos, 2), 16);
                    let b = parseInt(clean.substr(pos + 2, 2), 16);
                    if (!isNaN(a) && !isNaN(b)) state.targets.rpm = ((a * 256) + b) / 4;
                }
                // Парсинг Speed
                if (clean.includes("410D")) {
                    let pos = clean.indexOf("410D") + 4;
                    let a = parseInt(clean.substr(pos, 2), 16);
                    if (!isNaN(a)) state.targets.speed = a;
                }
            });
        }
    }

    /**
     * ОКНО НАСТРОЕК КОНФИГУРАЦИИ
     */
    document.getElementById('open-panel').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('settings-panel').style.display = 'block';
    });

    document.getElementById('close-panel').addEventListener('click', (e) => {
        e.stopPropagation();
        state.config.wheelR = parseFloat(document.getElementById('val-wheel').value);
        state.config.finalGear = parseFloat(document.getElementById('val-gear').value);
        state.config.brightness = document.getElementById('val-bright').value / 100;
        state.config.units = document.getElementById('val-units').value;
        
        canvas.style.opacity = state.config.brightness;
        document.getElementById('settings-panel').style.display = 'none';
        resetNavTimeout();
    });

    document.getElementById('go-fs').addEventListener('click', (e) => {
        e.stopPropagation();
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            document.getElementById('go-fs').classList.add('active');
        } else {
            document.exitFullscreen();
            document.getElementById('go-fs').classList.remove('active');
        }
    });

    // Обработчики разворота и изменения геометрии дисплея
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => {
        setTimeout(resizeCanvas, 300);
    });

    window.addEventListener('DOMContentLoaded', () => {
        resizeCanvas();
        setInterval(runDemoSimulation, 30);
        resetNavTimeout();
        processFrame();
    });
</script>
</body>
</html>
