<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CarPlay Pro v16.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            /* Ночная тема (по умолчанию) */
            --bg: #000000;
            --card: rgba(28, 28, 32, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #8e8e93;
            --accent: #0a84ff;
            --red: #ff453a;
            --yandex: #ffcc00;
        }

        [data-theme="day"] {
            --bg: #f2f2f7;
            --card: #ffffff;
            --border: rgba(0, 0, 0, 0.05);
            --text: #1c1c1e;
            --text-dim: #636366;
            --accent: #007aff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            transition: background 0.4s ease;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
        }

        /* Шапка */
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        
        .controls { display: flex; gap: 8px; }
        .btn {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 10px 18px; border-radius: 20px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-active { background: var(--accent); border-color: transparent; color: white; }

        /* Основная сетка */
        .dashboard {
            display: grid; grid-template-columns: 1fr 1.5fr 1fr;
            gap: 20px; height: calc(100% - 110px); align-items: center;
        }

        /* Шкалы */
        .gauge-container { position: relative; width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        .gauge-svg { width: 100%; height: 100%; transform: rotate(-10deg); }
        
        .map-hole {
            position: absolute; width: 72%; height: 72%; border-radius: 50%;
            overflow: hidden; z-index: 1; border: 2px solid var(--border);
        }

        .central-display {
            position: absolute; z-index: 10; text-align: center;
            background: var(--card); padding: 12px 20px; border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border);
        }
        .val { font-size: 54px; font-weight: 800; line-height: 1; }
        .unit { font-size: 12px; color: var(--text-dim); font-weight: 700; margin-top: 4px; }

        /* Центральная колонка (Выравнивание) */
        .center-stack { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 440px; margin: 0 auto; }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 16px; 
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* ADAS */
        .adas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .sign-circle {
            width: 70px; height: 70px; background: white; border-radius: 50%;
            border: 6px solid var(--red); display: flex; align-items: center; justify-content: center;
            color: black; font-size: 30px; font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .gps-status {
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 12px; font-weight: 800; text-align: center;
        }

        /* Датчики */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px;
        }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        .stat-val { font-size: 20px; font-weight: 700; margin-top: 4px; }

        /* Футер */
        .footer {
            height: 40px; display: flex; justify-content: space-between;
            align-items: center; font-size: 13px; font-weight: 600; color: var(--text-dim);
            border-top: 1px solid var(--border);
        }

        /* Анимация переключения темы */
        .theme-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body data-theme="dark">

<div class="header">
    <div class="logo">EGORKIN<span>DEV</span></div>
    <div class="controls">
        <button class="btn" id="themeBtn" onclick="toggleTheme()">Ночь</button>
        <button class="btn" id="connectBtn">OBDII</button>
        <button class="btn" onclick="forceFullscreen()">Экран</button>
    </div>
    <div id="clock" style="font-weight: 700; font-size: 18px;">19:00</div>
</div>

<div class="dashboard">
    <div class="gauge-container">
        <svg class="gauge-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" fill="none" stroke="var(--border)" stroke-width="6" stroke-dasharray="400 600" stroke-linecap="round" transform="rotate(140 100 100)"/>
            <circle id="speedFill" cx="100" cy="100" r="85" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="0 600" stroke-linecap="round" transform="rotate(140 100 100)" style="transition: 0.3s"/>
        </svg>
        <div class="central-display">
            <div class="val" id="speedNum">0</div>
            <div class="unit">КМ/Ч</div>
        </div>
    </div>

    <div class="center-stack">
        <div class="card" style="height: 100px;">
            <div>
                <div style="font-size: 11px; color: var(--yandex); font-weight: 800;">ЯНДЕКС МУЗЫКА</div>
                <div style="font-size: 18px; font-weight: 700;">Мой Плейлист Авто</div>
            </div>
            <button class="btn btn-active" onclick="window.open('https://music.yandex.ru')">Включить</button>
        </div>

        <div class="card">
            <div style="font-size: 12px; font-weight: 800; color: var(--text-dim);">СИСТЕМА<br>ADAS</div>
            <div class="adas-grid">
                <div class="sign-circle" id="signSpeed">60</div>
                <div class="gps-status" id="gpsStatus">GPS<br>READY</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Охлаждение</div>
                <div class="stat-val"><span id="coolant">90</span>°C</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Вольтаж</div>
                <div class="stat-val" style="color: var(--accent);"><span id="volt">14.1</span>V</div>
            </div>
        </div>
    </div>

    <div class="gauge-container">
        <div id="map" class="map-hole"></div>
        <svg class="gauge-svg" viewBox="0 0 200 200" style="z-index: 5; pointer-events: none;">
            <circle cx="100" cy="100" r="85" fill="none" stroke="var(--border)" stroke-width="6" stroke-dasharray="400 600" stroke-linecap="round" transform="rotate(140 100 100)"/>
            <circle id="rpmFill" cx="100" cy="100" r="85" fill="none" stroke="var(--red)" stroke-width="8" stroke-dasharray="0 600" stroke-linecap="round" transform="rotate(140 100 100)" style="transition: 0.3s"/>
        </svg>
        <div class="central-display" style="background: rgba(0,0,0,0.85);">
            <div class="val" id="gearNum" style="color: var(--red);">P</div>
            <div class="unit">ПЕРЕДАЧА</div>
        </div>
    </div>
</div>

<div class="footer">
    <div>Пробег: 142,833 км</div>
    <div id="trip">Поездка: 0.0 км</div>
    <div>Запас хода: 446 км</div>
</div>

<script>
    let isDay = false;
    let speed = 0;
    let rpm = 0;

    function toggleTheme() {
        isDay = !isDay;
        document.body.setAttribute('data-theme', isDay ? 'day' : 'dark');
        document.getElementById('themeBtn').innerText = isDay ? 'День' : 'Ночь';
        // Обновляем карту под тему
        if(map) {
            map.remove();
            initMap();
        }
    }

    function forceFullscreen() {
        const doc = window.document;
        const docEl = doc.documentElement;
        const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        
        if (requestFullScreen) {
            requestFullScreen.call(docEl);
        } else {
            // Если API заблокировано, просто скрываем лишнее через CSS-класс
            alert("Нажмите 'Поделиться' -> 'На экран Домой' для полного погружения");
        }
    }

    let map;
    function initMap() {
        const style = isDay ? 'voyager' : 'dark_all';
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([55.75, 37.61], 15);
        L.tileLayer(`https://{s}.basemaps.cartocdn.com/rastertiles/${style}/{z}/{x}/{y}{r}.png`).addTo(map);
        
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(p => {
                map.setView([p.coords.latitude, p.coords.longitude], 16);
                updateSigns(p.coords.speed);
            });
        }
    }

    function updateSigns(s) {
        let limit = 60;
        if (speed > 85) limit = 110;
        else if (speed > 55) limit = 90;
        document.getElementById('signSpeed').innerText = limit;
    }

    function engine() {
        // Симуляция для теста (если OBD не подключен)
        const t = Date.now();
        speed = 60 + Math.sin(t/2000) * 40;
        rpm = 2000 + Math.abs(Math.sin(t/1000)) * 3000;

        // Отрисовка Speed
        const sDash = (speed / 220) * 400;
        document.getElementById('speedFill').style.strokeDasharray = `${sDash} 600`;
        document.getElementById('speedNum').innerText = Math.round(speed);

        // Отрисовка RPM
        const rDash = (rpm / 8000) * 400;
        document.getElementById('rpmFill').style.strokeDasharray = `${rDash} 600`;
        
        // Передачи
        const gear = speed < 5 ? 'P' : Math.ceil(speed / 25);
        document.getElementById('gearNum').innerText = gear;

        // Часы
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        requestAnimationFrame(engine);
    }

    window.onload = () => {
        initMap();
        engine();
    };
</script>
</body>
</html>
