<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CarPlay Ultimate Pro v14.9 (Navi Edition)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg-pure: #000000;
            --panel-glass: rgba(22, 22, 28, 0.85);
            --border-line: rgba(255, 255, 255, 0.08);
            --color-blue: #0a84ff;
            --color-red: #ff453a;
            --color-yandex: #ffcc00;
            --text-main: #ffffff;
            --text-dark: #8e8e93;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg-pure); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
        }

        /* Верхняя панель */
        .top-bar { height: 50px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 10; }
        .brand-logo { font-size: 20px; font-weight: 700; }
        .brand-logo span { color: var(--color-blue); }
        .sys-actions { display: flex; gap: 10px; }
        .pill-btn {
            background: var(--panel-glass); border: 1px solid var(--border-line);
            color: var(--text-main); padding: 8px 16px; border-radius: 18px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .pill-btn.connected { background: var(--color-blue); border-color: transparent; box-shadow: 0 0 15px rgba(10,132,255,0.4); }
        .clock-display { font-size: 18px; font-weight: 700; min-width: 50px; text-align: right; }

        /* Сетка рабочей области */
        .main-viewport { flex: 1; display: grid; gap: 16px; min-height: 0; margin-bottom: 8px; }

        @media (orientation: landscape) {
            .main-viewport { grid-template-columns: 1fr 1.4fr 1fr; align-items: center; }
            .portrait-only { display: none !important; }
        }

        @media (orientation: portrait) {
            .main-viewport { grid-template-columns: 1fr; grid-template-rows: auto 1fr; align-items: stretch; }
            .landscape-only { display: none !important; }
            .portrait-gauges-header { display: flex; justify-content: space-between; gap: 12px; height: 110px; flex-shrink: 0; }
            .portrait-gauges-header .gauge-wrapper { height: 100%; width: 48%; }
        }

        /* Компоненты шкал */
        .gauge-wrapper { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 0; }
        .gauge-svg { width: 100%; height: 100%; max-width: 240px; max-height: 240px; position: relative; z-index: 3; background: transparent !important; }
        .track-bg { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 5; }
        .track-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.15s ease; }
        .gauge-tick { stroke: rgba(255, 255, 255, 0.15); stroke-width: 1.5; }
        .gauge-label { fill: var(--text-dark); font-size: 9px; font-weight: 700; text-anchor: middle; }

        /* Информационный центр внутри круга */
        .gauge-center-info { 
            position: absolute; text-align: center; display: flex; flex-direction: column; 
            align-items: center; z-index: 4; pointer-events: none;
            background: rgba(0, 0, 0, 0.45); padding: 6px 12px; border-radius: 14px; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
        }
        .val-num { font-size: clamp(32px, 6.5vh, 60px); font-weight: 800; line-height: 0.85; letter-spacing: -2px; }
        .val-unit { font-size: 11px; color: var(--text-dark); font-weight: 700; text-transform: uppercase; margin-top: 4px; }

        /* ИНТЕГРИРОВАННЫЙ КРУГЛЫЙ НАВИГАТОР ВНУТРИ ТАХОМЕТРА */
        .gauge-map-overlay {
            position: absolute;
            width: 71%; height: 71%; /* Идеально вписывается внутрь шкал прибора */
            border-radius: 50%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none; /* Карта не перехватывает жесты панели */
            opacity: 0.6; /* Легкое затемнение карты, чтобы шкала тахометра читалась идеально */
            border: 1px solid rgba(255,255,255,0.05);
        }
        /* Скрываем элементы управления Leaflet для чистого UI */
        .leaflet-control-container { display: none !important; }

        /* Центр панели: Плеер + Параметры */
        .center-layout-stack { display: flex; flex-direction: column; gap: 12px; height: 100%; min-height: 0; justify-content: center; }

        .native-media-card {
            background: linear-gradient(135deg, #1c1c22 0%, #0d0d11 100%);
            border: 1px solid var(--border-line);
            border-radius: 20px; height: 115px; overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .media-meta { display: flex; flex-direction: column; gap: 2px; }
        .media-title { font-size: 16px; font-weight: 700; color: #ffffff; }
        .media-subtitle { font-size: 11px; color: var(--color-yandex); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .media-action-link {
            background: var(--color-yandex); color: #000000; font-weight: 700;
            padding: 12px 20px; border-radius: 14px; font-size: 13px;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 12px rgba(255,204,0,0.2); transition: 0.2s;
        }
        .media-action-link:active { transform: scale(0.96); opacity: 0.9; }

        .eq-wave { display: flex; gap: 3px; align-items: flex-end; height: 24px; }
        .eq-bar { width: 3px; height: 4px; background: var(--color-yandex); border-radius: 2px; animation: eqJump 0.6s ease infinite alternate; }
        .eq-bar:nth-child(2) { animation-delay: 0.15s; }
        .eq-bar:nth-child(3) { animation-delay: 0.35s; }
        .eq-bar:nth-child(4) { animation-delay: 0.1s; }
        @keyframes eqJump { 0% { height: 4px; } 100% { height: 24px; } }

        /* Дашборд */
        .telemetry-dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; min-height: 0; }
        .tel-box {
            background: var(--panel-glass); border: 1px solid var(--border-line);
            border-radius: 16px; padding: 12px; display: flex; flex-direction: column; justify-content: center;
        }
        .tel-title { font-size: 10px; font-weight: 800; color: var(--text-dark); text-transform: uppercase; margin-bottom: 2px; }
        .tel-digit { font-size: clamp(18px, 3vh, 26px); font-weight: 700; }
        .tel-digit span { font-size: 14px; color: var(--text-dark); font-weight: 500; }

        .summary-footer {
            height: 35px; display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); font-size: 12px; color: var(--text-dark); font-weight: 600; flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="brand-logo">Car<span>Play</span> PRO</div>
    <div class="sys-actions">
        <button class="pill-btn" id="connectBleBtn">Bluetooth OBDII</button>
        <button class="pill-btn" onclick="toggleFullscreen()">Экран</button>
    </div>
    <div class="clock-display" id="realtimeClock">00:00</div>
</div>

<div class="main-viewport">

    <div class="gauge-wrapper landscape-only">
        <svg class="gauge-svg" viewBox="0 0 200 200" id="speedGaugeLnd"></svg>
        <div class="gauge-center-info">
            <div class="val-num" id="speedTextLnd">0</div>
            <div class="val-unit">км/ч</div>
        </div>
    </div>

    <div class="portrait-only portrait-gauges-header">
        <div class="gauge-wrapper">
            <svg class="gauge-svg" viewBox="0 0 200 200" id="speedGaugePrt"></svg>
            <div class="gauge-center-info">
                <div class="val-num" id="speedTextPrt">0</div>
                <div class="val-unit">км/ч</div>
            </div>
        </div>
        <div class="gauge-wrapper">
            <div id="mapPrt" class="gauge-map-overlay"></div>
            <svg class="gauge-svg" viewBox="0 0 200 200" id="rpmGaugePrt"></svg>
            <div class="gauge-center-info">
                <div class="val-num" id="gearTextPrt" style="color:var(--color-red)">P</div>
                <div class="val-unit">Передача</div>
            </div>
        </div>
    </div>

    <div class="center-layout-stack">
        <div class="native-media-card">
            <div class="media-meta">
                <div class="media-subtitle">Яндекс Музыка</div>
                <div class="media-title">Мой Плейлист Авто</div>
                <div class="eq-wave" style="margin-top: 6px;">
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                </div>
            </div>
            <a href="https://music.yandex.ru/playlists/2111e2b6-587d-a600-2fea-54df7c314477" target="_blank" class="media-action-link">
                <span>Включить</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </a>
        </div>

        <div class="telemetry-dashboard-grid">
            <div class="tel-box">
                <div class="tel-title">Охлаждение</div>
                <div class="tel-digit" id="coolantVal">--<span> °C</span></div>
            </div>
            <div class="tel-box">
                <div class="tel-title">Вольтаж</div>
                <div class="tel-digit" id="voltageVal" style="color:var(--color-blue)">--<span> V</span></div>
            </div>
            <div class="tel-box">
                <div class="tel-title">Масло</div>
                <div class="tel-digit" id="oilVal">--<span> °C</span></div>
            </div>
            <div class="tel-box">
                <div class="tel-title">Расход</div>
                <div class="tel-digit" id="consumptionVal">8.4<span> л</span></div>
            </div>
        </div>
    </div>

    <div class="gauge-wrapper landscape-only">
        <div id="mapLnd" class="gauge-map-overlay"></div>
        <svg class="gauge-svg" viewBox="0 0 200 200" id="rpmGaugeLnd"></svg>
        <div class="gauge-center-info">
            <div class="val-num" id="gearTextLnd" style="color:var(--color-red)">P</div>
            <div class="val-unit">Передача</div>
        </div>
    </div>

</div>

<div class="summary-footer">
    <div id="totalOdo">Пробег: 124,562 км</div>
    <div id="tripOdo">Поездка: 0.0 км</div>
    <div id="rangeOdo">Запас хода: 412 км</div>
</div>

<script>
    const carData = { speed: 0, rpm: 0, coolant: 90, voltage: 14.2, oil: 95, trip: 0.0, isConnected: false };
    const obdCommands = ["010C\r", "010D\r", "0105\r"];
    let currentCommandIndex = 0;
    let rxBuffer = ""; 
    let bleCharacteristic = null;

    // Глобальные переменные навигатора
    let maps = {}, markers = {};

    function drawGauge(id, max, step, color) {
        const el = document.getElementById(id);
        if (!el) return;
        const r = 82, len = 2 * Math.PI * r, arc = 0.75 * len;
        let html = `
            <circle class="track-bg" cx="100" cy="100" r="${r}" stroke-dasharray="${arc} ${len}" transform="rotate(135 100 100)"/>
            <circle id="${id}-fill" class="track-fill" stroke="${color}" cx="100" cy="100" r="${r}" stroke-dasharray="0 ${len}" transform="rotate(135 100 100)"/>
        `;
        for (let v = 0; v <= max; v += step) {
            const deg = 135 + (v / max) * 270;
            const rad = deg * Math.PI / 180;
            html += `<line class="gauge-tick" x1="${100+r*Math.cos(rad)}" y1="${100+r*Math.sin(rad)}" x2="${100+(r-5)*Math.cos(rad)}" y2="${100+(r-5)*Math.sin(rad)}" />`;
            if(v % (step*2) === 0 || v === max) {
                html += `<text x="${100+(r-16)*Math.cos(rad)}" y="${100+(r-16)*Math.sin(rad)+3}" class="gauge-label">${v}</text>`;
            }
        }
        el.innerHTML = html;
    }

    // Инициализация навигационных карт
    function initNavigationSystem() {
        const darkTilesUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        const defaultCoords = [55.7558, 37.6173]; // Москва по дефолту до получения координат GPS
        
        const mapIds = ['mapLnd', 'mapPrt'];
        mapIds.forEach(id => {
            const container = document.getElementById(id);
            if (container) {
                const map = L.map(id, { zoomControl: false, attributionControl: false }).setView(defaultCoords, 16);
                L.tileLayer(darkTilesUrl, { maxZoom: 18 }).addTo(map);
                
                // Элегантный маркер положения машины (белая точка в синем ореоле)
                const marker = L.circleMarker(defaultCoords, {
                    color: '#0a84ff', weight: 3, opacity: 0.8,
                    fillColor: '#ffffff', fillOpacity: 1, radius: 5
                }).addTo(map);
                
                maps[id] = map;
                markers[id] = marker;
            }
        });

        // Запуск штатного трекера геолокации смартфона
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    for (let id in maps) {
                        maps[id].setView([lat, lng], 16);
                        markers[id].setLatLng([lat, lng]);
                        // Принудительный рендеринг карты при смене ориентации экрана
                        setTimeout(() => maps[id].invalidateSize(), 200);
                    }
                },
                (err) => console.log("GPS Ошибка/Отказ доступа: ", err),
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }
    }

    document.getElementById('connectBleBtn').addEventListener('click', async () => {
        const btn = document.getElementById('connectBleBtn');
        try {
            btn.innerText = "Поиск...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [0xffe0] }, { namePrefix: 'OBD' }, { namePrefix: 'ELM' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });
            
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(0xffe0);
            bleCharacteristic = await service.getCharacteristic(0xffe1);
            
            await bleCharacteristic.startNotifications();
            bleCharacteristic.addEventListener('characteristicvaluechanged', handleIncomingObdBytes);
            
            carData.isConnected = true;
            btn.innerText = "Подключено";
            btn.classList.add('connected');
            
            setTimeout(() => sendCommandToCar("ATZ\r"), 200);
            setTimeout(() => sendCommandToCar("ATE0\r"), 600);
            setTimeout(() => nextObdQueryCycle(), 1000);

        } catch (err) {
            console.error(err);
            btn.innerText = "Ошибка BT";
            setTimeout(() => btn.innerText = "Bluetooth OBDII", 2500);
        }
    });

    function sendCommandToCar(cmd) {
        if (bleCharacteristic && carData.isConnected) {
            bleCharacteristic.writeValue(new TextEncoder().encode(cmd)).catch(() => {});
        }
    }

    function nextObdQueryCycle() {
        if (!carData.isConnected) return;
        sendCommandToCar(obdCommands[currentCommandIndex]);
        currentCommandIndex = (currentCommandIndex + 1) % obdCommands.length;
        setTimeout(nextObdQueryCycle, 300);
    }

    function handleIncomingObdBytes(event) {
        const chunk = new TextDecoder().decode(event.target.value);
        rxBuffer += chunk;
        if (rxBuffer.includes(">")) {
            cleanAndParseObdString(rxBuffer);
            rxBuffer = ""; 
        }
    }

    function cleanAndParseObdString(raw) {
        let clean = raw.replace(/\s+/g, "").toUpperCase();
        if (clean.includes("410C")) {
            let idx = clean.indexOf("410C") + 4;
            if (clean.length >= idx + 4) {
                let a = parseInt(clean.substr(idx, 2), 16);
                let b = parseInt(clean.substr(idx + 2, 2), 16);
                if (!isNaN(a) && !isNaN(b)) carData.rpm = ((a * 256) + b) / 4;
            }
        }
        else if (clean.includes("410D")) {
            let idx = clean.indexOf("410D") + 4;
            if (clean.length >= idx + 2) {
                let a = parseInt(clean.substr(idx, 2), 16);
                if (!isNaN(a)) carData.speed = a;
            }
        }
        else if (clean.includes("4105")) {
            let idx = clean.indexOf("4105") + 4;
            if (clean.length >= idx + 2) {
                let a = parseInt(clean.substr(idx, 2), 16);
                if (!isNaN(a)) carData.coolant = a - 40;
            }
        }
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        else document.exitFullscreen();
    }

    function runUiEngine() {
        const now = new Date();
        document.getElementById('realtimeClock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        if (!carData.isConnected) {
            const t = Date.now();
            carData.rpm = 800 + Math.abs(Math.sin(t / 3500)) * 3200;
            carData.speed = carData.rpm / 35;
            carData.coolant = Math.round(90 + Math.sin(t / 50000));
            carData.voltage = (14.1 + Math.sin(t / 10000) * 0.1).toFixed(1);
            carData.trip += (carData.speed / 240000);
        }

        const len = 2 * Math.PI * 82;
        const speedOffset = (carData.speed / 220) * 0.75 * len;
        const rpmOffset = (carData.rpm / 8000) * 0.75 * len;

        ['speedGaugeLnd-fill', 'speedGaugePrt-fill'].forEach(id => {
            const el = document.getElementById(id); if(el) el.style.strokeDasharray = `${speedOffset} ${len}`;
        });
        ['rpmGaugeLnd-fill', 'rpmGaugePrt-fill'].forEach(id => {
            const el = document.getElementById(id); if(el) el.style.strokeDasharray = `${rpmOffset} ${len}`;
        });

        const speedRound = Math.round(carData.speed);
        const currentGear = carData.speed < 5 ? 'P' : Math.min(6, Math.ceil(carData.speed / 32));

        if(document.getElementById('speedTextLnd')) document.getElementById('speedTextLnd').innerText = speedRound;
        if(document.getElementById('speedTextPrt')) document.getElementById('speedTextPrt').innerText = speedRound;
        if(document.getElementById('gearTextLnd')) document.getElementById('gearTextLnd').innerText = currentGear;
        if(document.getElementById('gearTextPrt')) document.getElementById('gearTextPrt').innerText = currentGear;

        document.getElementById('coolantVal').innerHTML = `${carData.coolant}<span> °C</span>`;
        document.getElementById('oilVal').innerHTML = `${carData.coolant + 4}<span> °C</span>`; 
        document.getElementById('voltageVal').innerHTML = `${carData.voltage}<span> V</span>`;
        document.getElementById('tripOdo').innerText = `Поездка: ${carData.trip.toFixed(1)} км`;

        requestAnimationFrame(runUiEngine);
    }

    // Слушатель смены ориентации экрана для корректного пересчета размеров навигации
    window.addEventListener('resize', () => {
        for (let id in maps) { setTimeout(() => maps[id].invalidateSize(), 300); }
    });

    window.onload = () => {
        drawGauge('speedGaugeLnd', 220, 20, 'var(--color-blue)');
        drawGauge('rpmGaugeLnd', 8, 1, 'var(--color-red)');
        drawGauge('speedGaugePrt', 220, 20, 'var(--color-blue)');
        drawGauge('rpmGaugePrt', 8, 1, 'var(--color-red)');
        
        initNavigationSystem(); // Запускаем карты и GPS
        runUiEngine();
    };
</script>
</body>
</html>
